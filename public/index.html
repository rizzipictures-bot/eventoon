<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FFFDF7">
<meta name="apple-mobile-web-app-title" content="EVENTOON!">
<title>EVENTOON! La tua città a fumetti</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#FFFDF7;font-family:'Fredoka',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{display:none}
@keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
input,textarea,select{font-family:'Comic Neue',cursive;font-size:14px;border:2.5px solid #ddd;border-radius:14px;padding:12px 16px;width:100%;margin-bottom:10px;background:#fff;outline:none;box-sizing:border-box;transition:border .15s}
input:focus,textarea:focus,select:focus{border-color:#E63946!important}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect}=React;

// ══════════════════════════════════════════
// STRIPE — Sostituisci con i tuoi link
// ══════════════════════════════════════════
const STRIPE_LINKS={
  "1-settimana":"https://buy.stripe.com/INSERISCI_LINK_1W",
  "2-settimane":"https://buy.stripe.com/INSERISCI_LINK_2W",
  "1-mese":"https://buy.stripe.com/INSERISCI_LINK_1M",
};

const CITIES={
  "reggio-emilia":{name:"Reggio Emilia",short:"RE",emoji:"🏛️",color:"#E63946"},
  "bologna":{name:"Bologna",short:"BO",emoji:"🏗️",color:"#7B2D8E"},
  "parma":{name:"Parma",short:"PR",emoji:"🎭",color:"#264653"},
  "modena":{name:"Modena",short:"MO",emoji:"🏎️",color:"#E76F51"},
  "ferrara":{name:"Ferrara",short:"FE",emoji:"🏰",color:"#606C38"},
  "ravenna":{name:"Ravenna",short:"RA",emoji:"✨",color:"#0077B6"},
  "rimini":{name:"Rimini",short:"RN",emoji:"🏖️",color:"#F4A261"},
  "piacenza":{name:"Piacenza",short:"PC",emoji:"⛪",color:"#9B5DE5"},
};
const CATS=[
  {id:"tutti",label:"Tutti",icon:"💥",color:"#1a1a1a"},
  {id:"sport",label:"Sport",icon:"🏃",color:"#2D6A4F"},
  {id:"musica",label:"Musica",icon:"🎵",color:"#7B2D8E"},
  {id:"mercati",label:"Mercati",icon:"🏺",color:"#C77B30"},
  {id:"arte",label:"Arte",icon:"🖼️",color:"#264653"},
  {id:"food",label:"Food",icon:"🍕",color:"#E63946"},
  {id:"famiglia",label:"Family",icon:"👶",color:"#00B4D8"},
];
const AD_TYPES=[
  {id:"corso",label:"Corso / Workshop",icon:"📚",color:"#264653"},
  {id:"concerto",label:"Concerto",icon:"🎵",color:"#7B2D8E"},
  {id:"locale",label:"Locale / Bar",icon:"🍸",color:"#E76F51"},
  {id:"ristorante",label:"Ristorante",icon:"🍝",color:"#B85042"},
  {id:"workshop",label:"Laboratorio",icon:"🎨",color:"#2A9D8F"},
];
const PLANS=[
  {id:"1-settimana",label:"1 Settimana",price:"19",desc:"Evento singolo, serata speciale",days:7},
  {id:"2-settimane",label:"2 Settimane",price:"29",desc:"Workshop, corsi brevi",days:14,popular:true},
  {id:"1-mese",label:"1 Mese",price:"49",desc:"Ristoranti, locali, corsi",days:30},
];

function daysLeft(dt){return Math.ceil((new Date(dt)-new Date())/864e5)}
function isOpen(m,d){return new Date(d)>=new Date(m.dateFrom)&&new Date(d)<=new Date(m.dateTo)}
function getDays(){const t=new Date(),r=[];for(let i=0;i<3;i++){const d=new Date(t);d.setDate(d.getDate()+i);r.push({id:d.toISOString().slice(0,10),label:i===0?"Oggi":i===1?"Domani":d.toLocaleDateString("it",{weekday:"long"}).replace(/^\w/,c=>c.toUpperCase()),sub:d.toLocaleDateString("it",{weekday:"short",day:"numeric",month:"short"})});}return r;}

// SVG Tab icons
function TabIcon({type,active}){
  const col=active?"#FFFFFF":"rgba(255,255,255,0.45)";
  const s={width:26,height:26,display:"block"};
  if(type==="home")return <svg style={s} viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>;
  if(type==="search")return <svg style={s} viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="2.2" strokeLinecap="round"><circle cx="10.5" cy="10.5" r="7"/><line x1="16" y1="16" x2="21" y2="21"/></svg>;
  if(type==="promote")return <svg style={s} viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
  if(type==="publish")return <svg style={s} viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5" fill={col}/><path d="M21 15l-5-5L5 21"/></svg>;
  if(type==="profile")return <svg style={s} viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
  return null;
}

function Pill({children,bg="#FFE66D",border="#E8D44D",color="#1a1a1a",style:s}){
  return <span style={{background:bg,border:"1.5px solid "+border,borderRadius:20,padding:"3px 10px",fontSize:11,color,display:"inline-flex",alignItems:"center",gap:3,...s}}>{children}</span>;
}

// Ad Card
function AdCard({ad,onClick}){
  return(
    <div onClick={()=>onClick?.(ad)} style={{border:"2.5px solid #D4A053",borderRadius:16,overflow:"hidden",background:"#fff",boxShadow:"0 4px 12px rgba(212,160,83,0.25)",cursor:"pointer",position:"relative"}}>
      <div style={{position:"absolute",top:8,right:8,background:"linear-gradient(135deg,#FFE66D,#F4A261)",padding:"3px 12px",borderRadius:20,fontSize:10,letterSpacing:.8,color:"#7B5B2A",fontWeight:"bold",zIndex:2}}>⭐ SPONSOR</div>
      <div style={{background:ad.color,padding:"14px 16px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(255,255,255,.06) 6px,rgba(255,255,255,.06) 7px)",pointerEvents:"none"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1,paddingRight:10}}><div style={{fontSize:15,fontWeight:600,color:"#fff",lineHeight:1.2}}>{ad.title}</div><div style={{fontFamily:"'Comic Neue',cursive",fontSize:11,color:"rgba(255,255,255,.8)",marginTop:4}}>📍 {ad.location}</div></div>
          <div style={{fontSize:30,lineHeight:1,flexShrink:0}}>{ad.image}</div>
        </div>
      </div>
      <div style={{padding:"12px 16px",background:"linear-gradient(180deg,#FFFDF7,#FFF8E1)"}}>
        <div style={{fontFamily:"'Comic Neue',cursive",fontSize:12.5,color:"#555",lineHeight:1.5,marginBottom:8}}>{ad.description}</div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}><Pill bg="#FFF3CD" border="#D4A053" color="#7B5B2A">🏢 {ad.business}</Pill><span style={{fontFamily:"'Comic Neue',cursive",fontSize:10,color:"#C77B30",marginLeft:"auto"}}>Scopri →</span></div>
      </div>
    </div>
  );
}

// Promote screen
function PromoteScreen({city}){
  const [step,setStep]=useState(0);
  const [adType,setAdType]=useState("");
  const [title,setTitle]=useState("");
  const [business,setBusiness]=useState("");
  const [location,setLocation]=useState("");
  const [desc,setDesc]=useState("");
  const [plan,setPlan]=useState("2-settimane");

  if(step===0)return(
    <div style={{padding:"16px 16px 0"}}>
      <div style={{fontSize:22,fontWeight:700,color:"#1a1a1a",marginBottom:4}}>📢 Promuovi la tua attività</div>
      <div style={{fontFamily:"'Comic Neue',cursive",fontSize:13,color:"#999",marginBottom:18}}>Raggiungi migliaia di persone a {CITIES[city]?.name}</div>
      <div style={{borderRadius:18,overflow:"hidden",marginBottom:18,boxShadow:"0 4px 16px rgba(0,0,0,0.05)"}}>
        <div style={{background:"#E63946",padding:"12px 16px",color:"#fff",fontSize:15}}>Come funziona</div>
        <div style={{padding:16,background:"#fff"}}>{["Scegli la categoria","Compila i dettagli","Scegli durata (da €19)","Paga con carta o Apple Pay","Appari nel feed!"].map((s,i)=>(<div key={i} style={{display:"flex",gap:12,alignItems:"center",padding:"10px 0",borderBottom:i<4?"1px solid #f5f5f0":"none"}}><div style={{width:28,height:28,borderRadius:14,background:"#FFE66D",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{i+1}</div><div style={{fontFamily:"'Comic Neue',cursive",fontSize:13,color:"#555"}}>{s}</div></div>))}</div>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:18}}>{PLANS.map(p=>(<div key={p.id} style={{flex:1,border:p.popular?"2.5px solid #E63946":"2px solid #eee",borderRadius:16,padding:12,textAlign:"center",background:p.popular?"#FFF0F0":"#fff",position:"relative"}}>{p.popular&&<div style={{position:"absolute",top:-9,left:"50%",transform:"translateX(-50%)",background:"#E63946",color:"#fff",fontSize:9,padding:"2px 10px",borderRadius:10}}>Popolare</div>}<div style={{fontSize:22,color:"#1a1a1a"}}>€{p.price}</div><div style={{fontFamily:"'Comic Neue',cursive",fontSize:10,color:"#999",marginTop:2}}>{p.label}</div></div>))}</div>
      <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>Categorie ammesse</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:18}}>{AD_TYPES.map(t=><div key={t.id} style={{background:t.color,color:"#fff",borderRadius:14,padding:"6px 14px",fontSize:12}}>{t.icon} {t.label}</div>)}</div>
      <button onClick={()=>setStep(1)} style={{width:"100%",background:"#E63946",color:"#fff",border:"none",borderRadius:16,padding:16,fontSize:17,fontWeight:600,cursor:"pointer",boxShadow:"0 4px 16px rgba(230,57,70,0.35)"}}>🚀 Crea la tua inserzione</button>
    </div>
  );

  if(step===1)return(
    <div style={{padding:"16px 16px 0"}}>
      <div onClick={()=>setStep(0)} style={{fontFamily:"'Comic Neue',cursive",fontSize:13,color:"#999",marginBottom:12,cursor:"pointer"}}>← Indietro</div>
      <div style={{fontSize:19,fontWeight:600,marginBottom:14}}>📝 Dettagli inserzione</div>
      <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>Categoria *</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>{AD_TYPES.map(t=><div key={t.id} onClick={()=>setAdType(t.id)} style={{background:adType===t.id?t.color:"#fff",color:adType===t.id?"#fff":"#1a1a1a",border:"2px solid "+(adType===t.id?t.color:"#eee"),borderRadius:14,padding:"7px 14px",fontSize:12,cursor:"pointer",transition:"all .12s",boxShadow:adType===t.id?"0 3px 10px rgba(0,0,0,0.15)":"none"}}>{t.icon} {t.label}</div>)}</div>
      <input placeholder="Nome attività *" value={business} onChange={e=>setBusiness(e.target.value)}/>
      <input placeholder="Titolo inserzione *" value={title} onChange={e=>setTitle(e.target.value)}/>
      <input placeholder="📍 Indirizzo *" value={location} onChange={e=>setLocation(e.target.value)}/>
      <textarea placeholder="Descrizione (max 150 car.) *" rows={3} style={{resize:"none"}} value={desc} onChange={e=>setDesc(e.target.value.slice(0,150))}/>
      <div style={{fontFamily:"'Comic Neue',cursive",fontSize:10,color:"#bbb",marginBottom:10,textAlign:"right",marginTop:-6}}>{desc.length}/150</div>
      <div style={{border:"3px dashed #ddd",borderRadius:18,padding:24,textAlign:"center",background:"#fafaf5",marginBottom:14,cursor:"pointer"}}><div style={{fontSize:32,marginBottom:4}}>📷</div><div style={{fontSize:13,color:"#999"}}>Carica foto o logo</div></div>
      <button onClick={()=>{if(adType&&title&&business&&desc)setStep(2)}} style={{width:"100%",background:adType&&title&&business&&desc?"#E63946":"#ddd",color:"#fff",border:"none",borderRadius:16,padding:14,fontSize:16,fontWeight:600,cursor:"pointer"}}>Avanti → Scegli piano</button>
    </div>
  );

  if(step===2)return(
    <div style={{padding:"16px 16px 0"}}>
      <div onClick={()=>setStep(1)} style={{fontFamily:"'Comic Neue',cursive",fontSize:13,color:"#999",marginBottom:12,cursor:"pointer"}}>← Indietro</div>
      <div style={{fontSize:19,fontWeight:600,marginBottom:14}}>💳 Scegli il piano</div>
      {PLANS.map(p=>(<div key={p.id} onClick={()=>setPlan(p.id)} style={{border:plan===p.id?"2.5px solid #E63946":"2px solid #eee",borderRadius:18,padding:16,marginBottom:12,cursor:"pointer",background:plan===p.id?"#FFF0F0":"#fff",boxShadow:plan===p.id?"0 4px 16px rgba(230,57,70,0.15)":"none",position:"relative",transition:"all .15s"}}>{p.popular&&<div style={{position:"absolute",top:-9,right:14,background:"#E63946",color:"#fff",fontSize:10,padding:"2px 12px",borderRadius:12}}>Più scelto</div>}<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:16,fontWeight:600}}>{p.label}</div><div style={{fontFamily:"'Comic Neue',cursive",fontSize:12,color:"#888",marginTop:2}}>{p.desc}</div></div><div style={{fontSize:28,color:"#E63946",fontWeight:700}}>€{p.price}</div></div></div>))}
      <div style={{border:"2px solid #eee",borderRadius:16,padding:14,marginBottom:14,background:"#fafafa"}}><div style={{fontSize:12,color:"#aaa",marginBottom:8}}>Pagamento sicuro</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}><Pill bg="#fff" border="#ddd" color="#555">💳 Visa/MC</Pill><Pill bg="#000" border="#000" color="#fff">🍎 Apple Pay</Pill><Pill bg="#fff" border="#ddd" color="#555">📱 Google Pay</Pill></div></div>
      <button onClick={()=>setStep(3)} style={{width:"100%",background:"#E63946",color:"#fff",border:"none",borderRadius:16,padding:14,fontSize:16,fontWeight:600,cursor:"pointer",boxShadow:"0 4px 16px rgba(230,57,70,0.3)"}}>Anteprima →</button>
    </div>
  );

  if(step===3){const sp=PLANS.find(p=>p.id===plan),st=AD_TYPES.find(t=>t.id===adType);return(
    <div style={{padding:"16px 16px 0"}}>
      <div onClick={()=>setStep(2)} style={{fontFamily:"'Comic Neue',cursive",fontSize:13,color:"#999",marginBottom:12,cursor:"pointer"}}>← Indietro</div>
      <div style={{fontSize:19,fontWeight:600,marginBottom:10}}>👁️ Anteprima</div>
      <div style={{border:"2.5px solid #D4A053",borderRadius:16,overflow:"hidden",marginBottom:16,position:"relative"}}><div style={{position:"absolute",top:8,right:8,background:"linear-gradient(135deg,#FFE66D,#F4A261)",padding:"3px 12px",borderRadius:20,fontSize:10,color:"#7B5B2A",fontWeight:"bold",zIndex:2}}>⭐ SPONSOR</div><div style={{background:st?.color||"#264653",padding:14}}><div style={{fontSize:15,fontWeight:600,color:"#fff"}}>{(title||"Titolo").toUpperCase()}</div><div style={{fontFamily:"'Comic Neue',cursive",fontSize:11,color:"rgba(255,255,255,.8)",marginTop:3}}>📍 {location||"Indirizzo"}</div></div><div style={{padding:"12px 14px",background:"linear-gradient(180deg,#FFFDF7,#FFF8E1)"}}><div style={{fontFamily:"'Comic Neue',cursive",fontSize:12,color:"#555",marginBottom:6}}>{desc||"Descrizione"}</div><Pill bg="#FFF3CD" border="#D4A053" color="#7B5B2A">🏢 {business||"Attività"}</Pill></div></div>
      <div style={{border:"2px solid #eee",borderRadius:18,padding:16,background:"#fff",marginBottom:16}}>
        <div style={{fontSize:15,fontWeight:600,marginBottom:10}}>Riepilogo</div>
        {[["Categoria",st?.label],["Attività",business],["Piano",sp?.label],["Durata",sp?.days+" giorni"],["Città",CITIES[city]?.name]].map(([k,v],i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<4?"1px solid #f5f5f0":"none"}}><span style={{fontFamily:"'Comic Neue',cursive",fontSize:13,color:"#888"}}>{k}</span><span style={{fontSize:13,fontWeight:600}}>{v}</span></div>))}
        <div style={{display:"flex",justifyContent:"space-between",paddingTop:12,marginTop:4}}><span style={{fontSize:18,fontWeight:600}}>Totale</span><span style={{fontSize:28,color:"#E63946",fontWeight:700}}>€{sp?.price}</span></div>
      </div>
      <button onClick={()=>{const u=STRIPE_LINKS[plan];if(u&&!u.includes("INSERISCI")){window.location.href=u}else{alert("Configura i Payment Link Stripe — vedi GUIDA-STRIPE.md")}}} style={{width:"100%",background:"#1a1a1a",color:"#FFE66D",border:"none",borderRadius:16,padding:16,fontSize:17,fontWeight:600,cursor:"pointer",boxShadow:"0 4px 20px rgba(0,0,0,0.3)"}}>💳 Paga €{sp?.price} e pubblica</button>
      <div style={{fontFamily:"'Comic Neue',cursive",fontSize:10,color:"#bbb",textAlign:"center",marginTop:10}}>Pagamento sicuro via Stripe</div>
    </div>);}
  return null;
}

// ══════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════
function App(){
  const [events,setEvents]=useState([]);
  const [ads,setAds]=useState([]);
  const [city,setCity]=useState("reggio-emilia");
  const [cat,setCat]=useState("tutti");
  const [days]=useState(getDays);
  const [day,setDay]=useState(getDays()[0].id);
  const [showCities,setShowCities]=useState(false);
  const [selected,setSelected]=useState(null);
  const [tab,setTab]=useState("home");
  const [updated,setUpdated]=useState("");

  useEffect(()=>{
    fetch("events.json").then(r=>r.json()).then(d=>{setEvents(d.events||[]);setUpdated(d.lastUpdated||"")}).catch(()=>{});
    fetch("ads.json").then(r=>r.json()).then(d=>setAds(d.ads||[])).catch(()=>{});
  },[]);

  const c=CITIES[city]||CITIES["reggio-emilia"];
  const cityAds=ads.filter(a=>a.cityKey===city&&a.status==="active"&&new Date()>=new Date(a.dateFrom)&&new Date()<=new Date(a.dateTo));
  const mostre=events.filter(e=>e.type==="mostra"&&e.cityKey===city&&isOpen(e,day)&&(cat==="tutti"||cat==="arte"||e.category===cat));
  const eventi=events.filter(e=>e.type==="evento"&&e.cityKey===city&&e.date===day&&(cat==="tutti"||e.category===cat));
  const total=mostre.length+eventi.length;
  const countDay=d=>events.filter(e=>(e.type==="evento"&&e.cityKey===city&&e.date===d)||(e.type==="mostra"&&e.cityKey===city&&isOpen(e,d))).length;

  return(
<div style={{minHeight:"100vh",background:"#FFFDF7",display:"flex",flexDirection:"column",position:"relative"}}>
  <div style={{position:"fixed",inset:0,background:'url("data:image/svg+xml,%3Csvg width=\'20\' height=\'20\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Ccircle cx=\'10\' cy=\'10\' r=\'1\' fill=\'%23000\' opacity=\'.012\'/%3E%3C/svg%3E")',pointerEvents:"none",zIndex:0}}/>

  {/* HEADER */}
  <div style={{position:"sticky",top:0,zIndex:50,background:"#FFFDF7",borderBottom:"2px solid #eee",paddingTop:"env(safe-area-inset-top,12px)"}}>
    <div style={{padding:"12px 16px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div onClick={()=>setTab("home")} style={{fontSize:28,fontWeight:700,color:"#1a1a1a",cursor:"pointer"}}><span style={{color:"#E63946"}}>E</span>VENTOON<span style={{color:"#FFE66D"}}>!</span></div>
      <div onClick={()=>setShowCities(!showCities)} style={{background:c.color,color:"#fff",borderRadius:20,padding:"7px 16px",fontSize:14,fontWeight:500,boxShadow:"0 3px 12px "+c.color+"44",cursor:"pointer"}}>{c.emoji} {c.short} ▾</div>
    </div>
  </div>

  {/* CITY PICKER */}
  {showCities&&<div style={{position:"fixed",inset:0,zIndex:200}} onClick={()=>setShowCities(false)}>
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.35)",backdropFilter:"blur(4px)",animation:"fadeIn .15s"}}/>
    <div onClick={e=>e.stopPropagation()} style={{position:"absolute",top:60,right:16,background:"#fff",borderRadius:20,boxShadow:"0 12px 40px rgba(0,0,0,0.2)",width:240,overflow:"hidden",animation:"slideIn .2s"}}>
      <div style={{padding:"14px 18px 8px",fontFamily:"'Comic Neue',cursive",fontSize:11,color:"#bbb",letterSpacing:1}}>SCEGLI CITTÀ</div>
      {Object.entries(CITIES).map(([k,ci])=>(
        <div key={k} onClick={()=>{setCity(k);setShowCities(false);setCat("tutti");setTab("home")}} style={{padding:"12px 18px",background:city===k?ci.color:"transparent",color:city===k?"#fff":"#1a1a1a",fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"background .1s"}}>

        </div>
        <div style={{display:"flex",gap:10}}>
          {[["#25D366","💬 WhatsApp"],["#E1306C","📸 Instagram"],["#1a1a1a","📋 Copia"]].map(([bg,label],i)=>(
            <button key={i} style={{flex:1,background:bg,color:"#fff",border:"none",borderRadius:14,padding:11,fontSize:12,fontWeight:500,cursor:"pointer",boxShadow:"0 3px 10px "+bg+"33"}}>{label}</button>
          ))}
        </div>
      </div>
    </div>
  </div>}

  {/* BOTTOM TAB BAR */}
  <div style={{position:"fixed",bottom:0,left:0,right:0,background:"linear-gradient(180deg,#E63946 0%,#C62836 100%)",borderRadius:"22px 22px 0 0",display:"flex",justifyContent:"space-around",padding:"10px 8px 0",paddingBottom:"calc(10px + env(safe-area-inset-bottom,16px))",zIndex:60,boxShadow:"0 -4px 24px rgba(230,57,70,0.3)"}}>
    {[{id:"home",type:"home",label:"Home"},{id:"search",type:"search",label:"Cerca"},{id:"promote",type:"promote",label:"Promuovi"},{id:"publish",type:"publish",label:"Pubblica"},{id:"profile",type:"profile",label:"Profilo"}].map(t=>(
      <div key={t.id} onClick={()=>{setTab(t.id);setSelected(null)}} style={{textAlign:"center",cursor:"pointer",padding:"6px 4px 4px",borderRadius:14,background:tab===t.id?"rgba(255,255,255,0.2)":"transparent",minWidth:56,transition:"all .15s"}}>
        <TabIcon type={t.type} active={tab===t.id}/>
        <div style={{fontSize:10,fontWeight:tab===t.id?600:400,color:tab===t.id?"#fff":"rgba(255,255,255,0.5)",marginTop:3}}>{t.label}</div>
      </div>
    ))}
  </div>
</div>);
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>

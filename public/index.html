<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FFFDF7">
<meta name="apple-mobile-web-app-title" content="EVENTOON!">
<title>EVENTOON!</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#FFFDF7;font-family:'Fredoka',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{display:none}
@keyframes si{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
.inp{font-family:'Comic Neue',cursive;font-size:14px;border:2.5px solid #ddd;border-radius:14px;padding:12px 16px;width:100%;margin-bottom:10px;background:#fff;outline:none;box-sizing:border-box}
.inp:focus{border-color:#E63946 !important}
.cn{font-family:'Comic Neue',cursive}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const {useState, useEffect} = React;

const CITIES = {
  "reggio-emilia":{name:"Reggio Emilia",short:"RE",em:"\u{1F3DB}\uFE0F",cl:"#E63946"},
  "bologna":{name:"Bologna",short:"BO",em:"\u{1F3D7}\uFE0F",cl:"#7B2D8E"},
  "parma":{name:"Parma",short:"PR",em:"\u{1F3AD}",cl:"#264653"},
  "modena":{name:"Modena",short:"MO",em:"\u{1F3CE}\uFE0F",cl:"#E76F51"},
  "ferrara":{name:"Ferrara",short:"FE",em:"\u{1F3F0}",cl:"#606C38"},
  "ravenna":{name:"Ravenna",short:"RA",em:"\u2728",cl:"#0077B6"},
  "rimini":{name:"Rimini",short:"RN",em:"\u{1F3D6}\uFE0F",cl:"#F4A261"},
  "piacenza":{name:"Piacenza",short:"PC",em:"\u26EA",cl:"#9B5DE5"},
};

const CATS=[
  {id:"tutti",label:"Tutti",cl:"#1a1a1a"},
  {id:"sport",label:"Sport",cl:"#2D6A4F"},
  {id:"musica",label:"Musica",cl:"#7B2D8E"},
  {id:"mercati",label:"Mercati",cl:"#C77B30"},
  {id:"arte",label:"Arte",cl:"#264653"},
  {id:"food",label:"Food",cl:"#E63946"},
  {id:"famiglia",label:"Family",cl:"#00B4D8"},
];

function dL(dt){return Math.ceil((new Date(dt)-new Date())/864e5)}
function isO(m,d){return new Date(d)>=new Date(m.dateFrom)&&new Date(d)<=new Date(m.dateTo)}
function gD(){
  const t=new Date(),r=[];
  for(let i=0;i<3;i++){
    const d=new Date(t);d.setDate(d.getDate()+i);
    const lb=i===0?"Oggi":i===1?"Domani":d.toLocaleDateString("it",{weekday:"long"});
    r.push({id:d.toISOString().slice(0,10),label:lb,sub:d.toLocaleDateString("it",{weekday:"short",day:"numeric",month:"short"})});
  }
  return r;
}

function TI({type,active}){
  const c=active?"#FFF":"rgba(255,255,255,0.4)";
  const s={width:26,height:26,display:"block"};
  if(type==="home")return <svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>;
  if(type==="search")return <svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.2" strokeLinecap="round"><circle cx="10.5" cy="10.5" r="7"/><line x1="16" y1="16" x2="21" y2="21"/></svg>;
  if(type==="promote")return <svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
  if(type==="publish")return <svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5" fill={c}/><path d="M21 15l-5-5L5 21"/></svg>;
  return <svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
}

function Pi({children,bg,bd,cl,style}){
  return <span style={{background:bg||"#FFE66D",border:"1.5px solid "+(bd||"#E8D44D"),borderRadius:20,padding:"3px 10px",fontSize:11,color:cl||"#1a1a1a",display:"inline-flex",alignItems:"center",gap:3,...(style||{})}}>{children}</span>;
}

function App(){
  const [ev,setEv]=useState([]);
  const [ads,setAds]=useState([]);
  const [city,setCity]=useState("reggio-emilia");
  const [cat,setCat]=useState("tutti");
  const [days]=useState(gD);
  const [day,setDay]=useState(gD()[0].id);
  const [menu,setMenu]=useState(false);
  const [sel,setSel]=useState(null);
  const [tab,setTab]=useState("home");
  const [upd,setUpd]=useState("");
  const [sq,setSq]=useState("");

  useEffect(()=>{
    fetch("events.json").then(r=>r.json()).then(d=>{setEv(d.events||[]);setUpd(d.lastUpdated||"")}).catch(()=>{});
    fetch("ads.json").then(r=>r.json()).then(d=>setAds(d.ads||[])).catch(()=>{});
  },[]);

  const c=CITIES[city]||CITIES["reggio-emilia"];
  const cAds=ads.filter(a=>a.cityKey===city&&a.status==="active");
  const mos=ev.filter(e=>e.type==="mostra"&&e.cityKey===city&&isO(e,day)&&(cat==="tutti"||cat==="arte"||e.category===cat));
  const evd=ev.filter(e=>e.type==="evento"&&e.cityKey===city&&e.date===day&&(cat==="tutti"||e.category===cat));
  const tot=mos.length+evd.length;
  const allC=ev.filter(e=>e.cityKey===city);
  const sRes=sq.length>=2?allC.filter(e=>(e.title+" "+e.description+" "+(e.location||"")).toLowerCase().indexOf(sq.toLowerCase())>=0):allC;

  function cD(d){return ev.filter(e=>(e.type==="evento"&&e.cityKey===city&&e.date===d)||(e.type==="mostra"&&e.cityKey===city&&isO(e,d))).length}

  return(
<div style={{minHeight:"100vh",background:"#FFFDF7",display:"flex",flexDirection:"column"}}>

  {/* HEAD */}
  <div style={{position:"sticky",top:0,zIndex:50,background:"#FFFDF7",borderBottom:"2px solid #eee",paddingTop:"env(safe-area-inset-top,12px)"}}>
    <div style={{padding:"12px 16px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div onClick={()=>{setTab("home");setSel(null)}} style={{fontSize:28,fontWeight:700,cursor:"pointer"}}><span style={{color:"#E63946"}}>E</span>VENTOON<span style={{color:"#FFE66D"}}>!</span></div>
      <div onClick={()=>setMenu(!menu)} style={{background:c.cl,color:"#fff",borderRadius:20,padding:"7px 16px",fontSize:14,fontWeight:500,cursor:"pointer"}}>{c.em} {c.short} &#9662;</div>
    </div>
  </div>

  {/* CITY */}
  {menu&&<div style={{position:"fixed",inset:0,zIndex:200}} onClick={()=>setMenu(false)}>
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.35)",animation:"fi .15s"}}/>
    <div onClick={e=>e.stopPropagation()} style={{position:"absolute",top:60,right:16,background:"#fff",borderRadius:20,boxShadow:"0 12px 40px rgba(0,0,0,0.2)",width:240,overflow:"hidden",animation:"si .2s"}}>
      <div style={{padding:"14px 18px 8px",fontSize:11,color:"#bbb"}} className="cn">SCEGLI CITTA</div>
      {Object.entries(CITIES).map(([k,ci])=>(
        <div key={k} onClick={()=>{setCity(k);setMenu(false);setCat("tutti");setTab("home")}} style={{padding:"12px 18px",background:city===k?ci.cl:"transparent",color:city===k?"#fff":"#1a1a1a",fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:20}}>{ci.em}</span>{ci.name}{city===k&&<span style={{marginLeft:"auto"}}>&#10003;</span>}
        </div>
      ))}
    </div>
  </div>}

  {/* BODY */}
  <div style={{flex:1,overflowY:"auto",padding:"0 0 110px",WebkitOverflowScrolling:"touch",position:"relative",zIndex:1}}>

  {/* ===HOME=== */}
  {tab==="home"&&<div style={{padding:"14px 16px 0"}}>
    <div style={{display:"flex",gap:8,marginBottom:12}}>{days.map(d=>(
      <div key={d.id} onClick={()=>setDay(d.id)} style={{flex:1,textAlign:"center",padding:"10px 4px",background:day===d.id?c.cl:"#fff",color:day===d.id?"#fff":"#1a1a1a",borderRadius:16,cursor:"pointer",position:"relative",boxShadow:day===d.id?"0 4px 14px "+c.cl+"33":"0 2px 8px rgba(0,0,0,0.04)"}}>
        <div style={{fontSize:15,fontWeight:600}}>{d.label}</div>
        <div className="cn" style={{fontSize:11,opacity:.7}}>{d.sub}</div>
        <div style={{position:"absolute",top:-6,right:-4,background:"#FFE66D",borderRadius:12,minWidth:22,height:22,fontSize:11,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center"}}>{cD(d.id)}</div>
      </div>
    ))}</div>
    <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:14,scrollbarWidth:"none"}}>{CATS.map(ct=>(
      <div key={ct.id} onClick={()=>setCat(ct.id)} style={{background:cat===ct.id?ct.cl:"#fff",color:cat===ct.id?"#fff":"#666",borderRadius:20,padding:"7px 16px",fontSize:13,fontWeight:500,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,boxShadow:cat===ct.id?"0 3px 10px "+ct.cl+"33":"0 1px 4px rgba(0,0,0,0.05)"}}>{ct.label}</div>
    ))}</div>
    <div className="cn" style={{fontSize:13,color:"#999",marginBottom:14}}><strong style={{color:"#1a1a1a"}}>{tot}</strong> eventi e mostre</div>
    {cAds.length>0&&<div onClick={()=>setSel(cAds[0])} style={{border:"2.5px solid #D4A053",borderRadius:16,overflow:"hidden",background:"#fff",boxShadow:"0 4px 12px rgba(212,160,83,0.25)",cursor:"pointer",position:"relative",marginBottom:16}}>
      <div style={{position:"absolute",top:8,right:8,background:"linear-gradient(135deg,#FFE66D,#F4A261)",padding:"3px 12px",borderRadius:20,fontSize:10,color:"#7B5B2A",fontWeight:"bold",zIndex:2}}>SPONSOR</div>
      <div style={{background:cAds[0].color,padding:"14px 16px"}}><div style={{fontSize:15,fontWeight:600,color:"#fff"}}>{cAds[0].title}</div><div className="cn" style={{fontSize:11,color:"rgba(255,255,255,.8)",marginTop:4}}>{cAds[0].location}</div></div>
      <div style={{padding:"12px 16px",background:"linear-gradient(180deg,#FFFDF7,#FFF8E1)"}}><div className="cn" style={{fontSize:12.5,color:"#555",lineHeight:1.5}}>{cAds[0].description}</div></div>
    </div>}
    {mos.length>0&&<div>
      <div style={{fontSize:17,fontWeight:600,marginBottom:10}}>Mostre ({mos.length}) <span className="cn" style={{fontWeight:400,fontSize:11,color:"#ccc"}}>scorri &rarr;</span></div>
      <div style={{display:"flex",gap:12,overflowX:"auto",marginBottom:18,paddingBottom:6,marginLeft:-16,marginRight:-16,paddingLeft:16,paddingRight:16,scrollbarWidth:"none"}}>{mos.map(m=>{const dl=dL(m.dateTo);return(
        <div key={m.id} onClick={()=>setSel(m)} style={{borderRadius:18,overflow:"hidden",background:"#fff",boxShadow:"0 4px 16px rgba(0,0,0,0.08)",cursor:"pointer",minWidth:265,maxWidth:285,flexShrink:0}}>
          <div style={{background:m.color,padding:"12px 16px"}}><div style={{display:"flex",justifyContent:"space-between"}}><div style={{flex:1,paddingRight:8}}><div style={{fontSize:14,fontWeight:600,color:"#fff",lineHeight:1.2}}>{m.title}</div><div className="cn" style={{fontSize:10,color:"rgba(255,255,255,.75)",marginTop:4}}>{m.location}</div></div><div style={{fontSize:26,lineHeight:1}}>{m.image}</div></div></div>
          <div style={{padding:"10px 16px 12px"}}><div className="cn" style={{fontSize:11,color:"#666",lineHeight:1.5,marginBottom:8}}>{m.description}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {dl<=14&&<Pi bg="#FEE2E2" bd="#FECACA" cl="#991B1B" style={{fontSize:10}}>{dl}gg rimasti</Pi>}
              {dl>14&&<Pi bg="#E0F2FE" bd="#BAE6FD" cl="#0369A1" style={{fontSize:10}}>fino {new Date(m.dateTo).toLocaleDateString("it",{day:"numeric",month:"short"})}</Pi>}
              {m.free&&<Pi bg="#FEF9C3" bd="#FDE68A" cl="#854D0E" style={{fontSize:10}}>Gratis</Pi>}
            </div>
          </div>
        </div>)})}</div>
    </div>}
    {evd.length>0&&<div>
      <div style={{fontSize:17,fontWeight:600,marginBottom:10}}>Eventi ({evd.length})</div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>{evd.map(e=>(
        <div key={e.id} onClick={()=>setSel(e)} style={{borderRadius:18,overflow:"hidden",background:"#fff",boxShadow:"0 4px 16px rgba(0,0,0,0.07)",cursor:"pointer"}}>
          <div style={{background:e.color,padding:"12px 16px"}}><div style={{display:"flex",justifyContent:"space-between"}}><div style={{flex:1,paddingRight:10}}><div style={{fontSize:16,fontWeight:600,color:"#fff",lineHeight:1.2}}>{e.title}</div><div className="cn" style={{fontSize:11,color:"rgba(255,255,255,.8)",marginTop:4}}>{e.location}</div></div><div style={{fontSize:30,lineHeight:1,flexShrink:0}}>{e.image}</div></div></div>
          <div style={{padding:"12px 16px"}}><div className="cn" style={{fontSize:12.5,color:"#555",lineHeight:1.5,marginBottom:10}}>{e.description}</div><div style={{display:"flex",gap:6}}><Pi>{e.time}</Pi>{e.free&&<Pi bg="#DCFCE7" bd="#BBF7D0" cl="#166534">Gratis</Pi>}<span className="cn" style={{fontSize:10,color:"#ccc",marginLeft:"auto"}}>{e.source}</span></div></div>
          <div style={{borderTop:"1.5px solid #f5f5f0",display:"flex"}}><div className="cn" style={{flex:1,textAlign:"center",padding:"10px 0",fontSize:11,color:"#aaa",borderRight:"1px solid #f5f5f0"}}>Mi piace</div><div className="cn" style={{flex:1,textAlign:"center",padding:"10px 0",fontSize:11,color:"#aaa",borderRight:"1px solid #f5f5f0"}}>Condividi</div><div className="cn" style={{flex:1,textAlign:"center",padding:"10px 0",fontSize:11,color:"#aaa"}}>Salva</div></div>
        </div>
      ))}</div>
    </div>}
    {tot===0&&<div style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:42,color:"#eee",fontWeight:700}}>Nada!</div></div>}
    {upd&&<div className="cn" style={{fontSize:10,color:"#ddd",textAlign:"center",marginTop:20}}>Aggiornato: {new Date(upd).toLocaleString("it")}</div>}
  </div>}

  {/* ===SEARCH=== */}
  {tab==="search"&&<div style={{padding:"16px 16px 0"}}>
    <input className="inp" value={sq} onChange={e=>setSq(e.target.value)} placeholder="Cerca eventi, mostre, luoghi..." style={{fontSize:16,borderRadius:18,padding:"14px 18px"}} />
    {sq.length<2&&<div>
      <div style={{fontSize:15,fontWeight:600,marginBottom:10}}>Trending a {c.name}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>{["maratona","fotografia","mercatini","musica","BMX","danza","cioccolato","antiquariato"].map(t=>(
        <div key={t} onClick={()=>setSq(t)} className="cn" style={{background:"#fff",borderRadius:20,padding:"8px 16px",fontSize:13,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>{t}</div>
      ))}</div>
      <div style={{fontSize:15,fontWeight:600,marginBottom:10}}>Filtra per distanza</div>
      <div style={{display:"flex",gap:8,marginBottom:20}}>{["500m","1 km","5 km","15 km","Provincia"].map((d,i)=>(
        <div key={d} style={{flex:1,textAlign:"center",padding:"10px 4px",borderRadius:16,fontSize:12,cursor:"pointer",background:i===2?c.cl:"#fff",color:i===2?"#fff":"#666",fontWeight:i===2?600:400,boxShadow:i===2?"0 3px 10px "+c.cl+"33":"0 1px 4px rgba(0,0,0,0.05)"}}>{d}</div>
      ))}</div>
      <div style={{fontSize:15,fontWeight:600,marginBottom:10}}>Tutti gli eventi ({allC.length})</div>
    </div>}
    {sq.length>=2&&<div className="cn" style={{fontSize:13,color:"#999",marginBottom:12}}>{sRes.length} risultati per "{sq}" <span onClick={()=>setSq("")} style={{color:"#E63946",cursor:"pointer",marginLeft:8}}>Cancella</span></div>}
    {sRes.map(e=>(
      <div key={e.id} onClick={()=>setSel(e)} style={{display:"flex",gap:12,alignItems:"center",padding:"12px 0",borderBottom:"1px solid #f0f0f0",cursor:"pointer"}}>
        <div style={{width:48,height:48,borderRadius:14,background:e.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{e.image}</div>
        <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:600,lineHeight:1.2}}>{e.title}</div><div className="cn" style={{fontSize:11,color:"#999",marginTop:3}}>{e.location}</div></div>
        <div style={{color:"#ccc"}}>&rarr;</div>
      </div>
    ))}
    {sq.length>=2&&sRes.length===0&&<div style={{textAlign:"center",padding:"40px 20px"}}><div style={{fontSize:36,color:"#eee",fontWeight:700}}>Nada!</div></div>}
  </div>}

  {/* ===PROMOTE=== */}
  {tab==="promote"&&<div style={{padding:"16px 16px 0"}}>
    <div style={{fontSize:22,fontWeight:700,marginBottom:4}}>Promuovi la tua attivita</div>
    <div className="cn" style={{fontSize:13,color:"#999",marginBottom:18}}>Raggiungi migliaia di persone a {c.name}</div>
    <div style={{borderRadius:18,overflow:"hidden",marginBottom:18,boxShadow:"0 4px 16px rgba(0,0,0,0.05)"}}>
      <div style={{background:"#E63946",padding:"12px 16px",color:"#fff",fontSize:15}}>Come funziona</div>
      <div style={{padding:16,background:"#fff"}}>{["Scegli la categoria","Compila i dettagli","Scegli durata (da 19 EUR)","Paga con carta o Apple Pay","Appari nel feed!"].map((s,i)=>(
        <div key={i} style={{display:"flex",gap:12,alignItems:"center",padding:"10px 0",borderBottom:i<4?"1px solid #f5f5f0":"none"}}><div style={{width:28,height:28,borderRadius:14,background:"#FFE66D",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{i+1}</div><div className="cn" style={{fontSize:13,color:"#555"}}>{s}</div></div>
      ))}</div>
    </div>
    <div style={{display:"flex",gap:10,marginBottom:18}}>
      <div style={{flex:1,border:"2px solid #eee",borderRadius:16,padding:12,textAlign:"center"}}><div style={{fontSize:22}}>19 EUR</div><div className="cn" style={{fontSize:10,color:"#999",marginTop:2}}>1 Settimana</div></div>
      <div style={{flex:1,border:"2.5px solid #E63946",borderRadius:16,padding:12,textAlign:"center",background:"#FFF0F0",position:"relative"}}><div style={{position:"absolute",top:-9,left:"50%",transform:"translateX(-50%)",background:"#E63946",color:"#fff",fontSize:9,padding:"2px 10px",borderRadius:10}}>Popolare</div><div style={{fontSize:22}}>29 EUR</div><div className="cn" style={{fontSize:10,color:"#999",marginTop:2}}>2 Settimane</div></div>
      <div style={{flex:1,border:"2px solid #eee",borderRadius:16,padding:12,textAlign:"center"}}><div style={{fontSize:22}}>49 EUR</div><div className="cn" style={{fontSize:10,color:"#999",marginTop:2}}>1 Mese</div></div>
    </div>
    <button style={{width:"100%",background:"#E63946",color:"#fff",border:"none",borderRadius:16,padding:16,fontSize:17,fontWeight:600,cursor:"pointer",boxShadow:"0 4px 16px rgba(230,57,70,0.35)"}}>Crea la tua inserzione</button>
  </div>}

  {/* ===PUBLISH=== */}
  {tab==="publish"&&<div style={{padding:"16px 16px 0"}}>
    <div style={{fontSize:22,fontWeight:700,marginBottom:4}}>Pubblica un evento</div>
    <div className="cn" style={{fontSize:13,color:"#999",marginBottom:18}}>Segnala un evento a {c.name}</div>
    {[{bg:"#FFE66D",t:"Scatta o carica foto",d:"Volantino, manifesto, luogo",xp:"+5 XP"},{bg:"#E0F2FE",t:"Incolla un link",d:"L'AI estrae tutto",xp:"+3 XP"},{bg:"#FEF9C3",t:"Inserisci manualmente",d:"Compila titolo, luogo, data",xp:"+2 XP"}].map((m,i)=>(
      <div key={i} style={{borderRadius:18,padding:16,marginBottom:12,background:"#fff",boxShadow:"0 4px 16px rgba(0,0,0,0.05)",display:"flex",gap:14,alignItems:"center",cursor:"pointer"}}>
        <div style={{width:50,height:50,borderRadius:16,background:m.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700}}>{["CAM","URL","TXT"][i]}</div>
        <div style={{flex:1}}><div style={{fontSize:15,fontWeight:600}}>{m.t}</div><div className="cn" style={{fontSize:12,color:"#888",marginTop:2}}>{m.d}</div></div>
        <Pi bg="#DCFCE7" bd="#BBF7D0" cl="#166534" style={{fontSize:10}}>{m.xp}</Pi>
      </div>
    ))}
    <div style={{borderRadius:18,padding:16,background:"#f9f9f5",marginTop:8}}>
      <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>Il tuo livello: Reporter Junior</div>
      <div style={{background:"#eee",borderRadius:10,height:10,overflow:"hidden",marginBottom:6}}><div style={{background:"linear-gradient(90deg,#E63946,#FFE66D)",height:"100%",width:"35%",borderRadius:10}}/></div>
      <div className="cn" style={{fontSize:10,color:"#bbb"}}>35/100 XP</div>
    </div>
  </div>}

  {/* ===PROFILE=== */}
  {tab==="profile"&&<div style={{padding:"16px 16px 0"}}>
    <div style={{borderRadius:20,overflow:"hidden",boxShadow:"0 4px 20px rgba(0,0,0,0.1)",marginBottom:16}}>
      <div style={{background:c.cl,padding:20}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:56,height:56,borderRadius:"50%",border:"3px solid #fff",background:"#FFE66D",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:700}}>P</div>
          <div><div style={{fontSize:20,fontWeight:700,color:"#fff"}}>Il tuo profilo</div><div style={{background:"rgba(255,255,255,0.2)",borderRadius:12,padding:"3px 12px",fontSize:11,color:"#fff",display:"inline-block",marginTop:4}}>Reporter Junior</div></div>
        </div>
      </div>
      <div style={{padding:16,background:"#fff",display:"flex",justifyContent:"space-around"}}>
        {[["12","Eventi"],["35","XP"],["89","Likes"],["23","Share"]].map(([n,l],i)=>(
          <div key={i} style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:700}}>{n}</div><div className="cn" style={{fontSize:10,color:"#999"}}>{l}</div></div>
        ))}
      </div>
    </div>
    <div style={{fontSize:15,fontWeight:600,marginBottom:10}}>Badge</div>
    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:20}}>
      {[["CAM","Prima foto",true],["5","5 eventi",true],["7d","Streak",false],["TOP","Top Rep.",false],["50","50 likes",false],["3C","3 citta",false]].map(([i,l,ok],j)=>(
        <div key={j} style={{borderRadius:16,padding:"10px 12px",textAlign:"center",opacity:ok?1:.3,background:ok?"#FFE66D":"#f0f0f0",minWidth:70}}><div style={{fontSize:16,fontWeight:700}}>{i}</div><div style={{fontSize:9,marginTop:2}}>{l}</div></div>
      ))}
    </div>
    <div style={{fontSize:15,fontWeight:600,marginBottom:10}}>Preferenze</div>
    {["Notifiche vicini","Notifiche salvati","Tavola Domenica","Raggio: 15 km"].map((l,i)=>(
      <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 0",borderBottom:"1px solid #f0f0f0"}}>
        <span className="cn" style={{fontSize:14,color:"#555"}}>{l}</span>
        <div style={{width:44,height:24,borderRadius:12,background:i<3?"#4ADE80":"#ddd",position:"relative"}}><div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:i<3?23:3}}/></div>
      </div>
    ))}
    <div style={{borderRadius:18,padding:16,background:"#FFF0F0",marginTop:16,textAlign:"center"}}><div className="cn" style={{fontSize:13,color:"#E63946"}}>v1.0 EVENTOON!</div></div>
  </div>}

  </div>{/* end body scroll */}

  {/* DETAIL */}
  {sel&&<div style={{position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"flex-end"}}>
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.4)",animation:"fi .15s"}} onClick={()=>setSel(null)}/>
    <div style={{position:"relative",zIndex:1,width:"100%",background:"#FFFDF7",borderRadius:"24px 24px 0 0",maxHeight:"85vh",overflowY:"auto",animation:"su .3s cubic-bezier(.32,.72,.37,1.05)",paddingBottom:24}}>
      <div style={{padding:"12px 0 6px",textAlign:"center"}}><div style={{width:40,height:5,background:"#ddd",borderRadius:3,margin:"0 auto"}}/></div>
      <div style={{background:sel.color,padding:"20px 22px",margin:"4px 16px 0",borderRadius:20}}>
        {sel.type==="mostra"&&<div style={{fontSize:12,color:"rgba(255,255,255,.6)",marginBottom:4}}>Mostra in corso</div>}
        <div style={{fontSize:44,marginBottom:8}}>{sel.image}</div>
        <div style={{fontSize:22,fontWeight:700,color:"#fff",lineHeight:1.15}}>{sel.title}</div>
        {sel.business&&<div className="cn" style={{fontSize:12,color:"rgba(255,255,255,.7)",marginTop:6}}>{sel.business}</div>}
      </div>
      <div style={{padding:"16px 20px 0"}}>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
          <Pi style={{fontSize:12}}>{sel.location}</Pi>
          {sel.dateTo&&<Pi bg="#E0F2FE" bd="#BAE6FD" cl="#0369A1" style={{fontSize:12}}>fino {new Date(sel.dateTo).toLocaleDateString("it",{day:"numeric",month:"long"})}</Pi>}
          {sel.orari&&<Pi bg="#fff" bd="#ddd" cl="#555" style={{fontSize:12}}>{sel.orari}</Pi>}
          {sel.time&&<Pi style={{fontSize:12}}>{sel.time}</Pi>}
          {sel.free&&<Pi bg="#DCFCE7" bd="#BBF7D0" cl="#166534" style={{fontSize:12}}>Gratis</Pi>}
        </div>
        <div style={{background:"#F0F7FF",borderRadius:18,padding:"14px 18px",marginBottom:16}}><div className="cn" style={{fontSize:14,lineHeight:1.7,color:"#333"}}>{sel.description}</div></div>
        {sel.source&&<div className="cn" style={{fontSize:11,color:"#ccc",marginBottom:16}}>Fonte: {sel.source}</div>}
        <div style={{display:"flex",gap:10,marginBottom:10}}>
          <button style={{flex:1,background:sel.color,color:"#fff",border:"none",borderRadius:16,padding:14,fontSize:15,fontWeight:600,cursor:"pointer"}}>Mappa</button>
          <button style={{flex:1,background:"#FFE66D",color:"#1a1a1a",border:"none",borderRadius:16,padding:14,fontSize:15,fontWeight:600,cursor:"pointer"}}>Salva</button>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button style={{flex:1,background:"#25D366",color:"#fff",border:"none",borderRadius:14,padding:11,fontSize:12,cursor:"pointer"}}>WhatsApp</button>
          <button style={{flex:1,background:"#E1306C",color:"#fff",border:"none",borderRadius:14,padding:11,fontSize:12,cursor:"pointer"}}>Instagram</button>
          <button style={{flex:1,background:"#1a1a1a",color:"#fff",border:"none",borderRadius:14,padding:11,fontSize:12,cursor:"pointer"}}>Copia</button>
        </div>
      </div>
    </div>
  </div>}

  {/* TABS */}
  <div style={{position:"fixed",bottom:0,left:0,right:0,background:"linear-gradient(180deg,#E63946,#C62836)",borderRadius:"22px 22px 0 0",display:"flex",justifyContent:"space-around",padding:"10px 8px 0",paddingBottom:"calc(10px + env(safe-area-inset-bottom,16px))",zIndex:60,boxShadow:"0 -4px 24px rgba(230,57,70,0.3)"}}>
    {[["home","home","Home"],["search","search","Cerca"],["promote","promote","Promuovi"],["publish","publish","Pubblica"],["profile","profile","Profilo"]].map(([id,tp,lb])=>(
      <div key={id} onClick={()=>{setTab(id);setSel(null)}} style={{textAlign:"center",cursor:"pointer",padding:"6px 4px 4px",borderRadius:14,background:tab===id?"rgba(255,255,255,0.2)":"transparent",minWidth:56}}>
        <TI type={tp} active={tab===id}/>
        <div style={{fontSize:10,fontWeight:tab===id?600:400,color:tab===id?"#fff":"rgba(255,255,255,0.5)",marginTop:3}}>{lb}</div>
      </div>
    ))}
  </div>

</div>);
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>

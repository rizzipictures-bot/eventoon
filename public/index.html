const {useState, useEffect, useRef} = React;

const EVENTS=[
  {id:"re1",type:"evento",title:"Viaromantiquaria",category:"mercati",date:"2026-03-14",time:"09–19:30",location:"Via Roma",cityKey:"reggio-emilia",description:"Antiquariato, numismatica, filatelia e quadri antichi.",free:true,source:"Turismo Reggiano"},

  {id:"re4",type:"evento",title:"Emanuele Ferrari — Piano",category:"musica",date:"2026-03-14",time:"20:30",location:"Teatro Cavallerizza",cityKey:"reggio-emilia",description:"Recital pianistico. Stagione 2025-2026.",free:false,source:"I Teatri RE"},
  {id:"re5",type:"evento",title:"La 21 Mezza Maratona",category:"sport",date:"2026-03-15",time:"09:30",location:"P.zza Vittoria",cityKey:"reggio-emilia",description:"21km e 10km FIDAL. 5.500 partecipanti.",free:false,source:"Stampa Reggiana"},

  {id:"rem2",type:"mostra",title:"Sheroes Cafe — Borella",category:"arte",dateFrom:"2026-02-01",dateTo:"2026-03-30",orari:"Lun-Ven 9-18",location:"UNIMORE",cityKey:"reggio-emilia",description:"Sopravvissute agli attacchi con acido.",free:true,source:"TIPO Magazine"},
  {id:"rem3",type:"mostra",title:"Contrappunto in nero",category:"arte",dateFrom:"2026-03-14",dateTo:"2026-05-17",orari:"Mar, Dom 10-18:30",location:"Museo Civico Correggio",cityKey:"reggio-emilia",description:"Ascolini e Ghidorsi: dialogo fotografico.",free:false,source:"Turismo Reggiano"},
  {id:"rem4",type:"mostra",title:"Ligabue e Tirelli",category:"arte",dateFrom:"2025-11-15",dateTo:"2026-12-31",orari:"Sab-Dom 10-18",location:"Palazzo Bentivoglio",cityKey:"reggio-emilia",description:"Arte e teatro nella Bassa reggiana.",free:false,source:"Turismo Reggiano"},
  {id:"rem5",type:"mostra",title:"Dance Well",category:"arte",dateFrom:"2025-11-01",dateTo:"2026-05-31",orari:"Date variabili",location:"Palazzo dei Musei",cityKey:"reggio-emilia",description:"Danza inclusiva negli spazi museali.",free:true,source:"Musei Civici RE"},
  {id:"rem6",type:"mostra",title:"Museo Psichiatria",category:"arte",dateFrom:"2026-01-01",dateTo:"2026-12-31",orari:"Sab-Dom 15-18",location:"Campus San Lazzaro",cityKey:"reggio-emilia",description:"Storia dell'internamento psichiatrico.",free:false,source:"Musei Civici RE"},

  {id:"bom1",type:"mostra",title:"John Giorno",category:"arte",dateFrom:"2026-01-15",dateTo:"2026-05-03",orari:"Mar-Dom 10-18:30",location:"MAMbo",cityKey:"bologna",description:"Retrospettiva del poeta performer.",free:false,source:"Bologna Welcome"},
  {id:"bom2",type:"mostra",title:"Viva Varda!",category:"arte",dateFrom:"2026-03-05",dateTo:"2027-01-10",orari:"Mar-Dom 10-18",location:"Modernissimo",cityKey:"bologna",description:"Varda: cinema, foto, installazioni.",free:false,source:"Bologna Welcome"},
  {id:"bom3",type:"mostra",title:"Ruth Orkin",category:"arte",dateFrom:"2026-03-05",dateTo:"2026-07-19",orari:"10-20",location:"Palazzo Pallavicini",cityKey:"bologna",description:"187 foto della fotografa americana.",free:false,source:"Revenews"},
  {id:"pr1",type:"evento",title:"Mercanteinfiera",category:"mercati",date:"2026-03-14",time:"09–18",location:"Fiere di Parma",cityKey:"parma",description:"La più grande fiera antiquariato d'Europa.",free:false,source:"ParmaToday"},
  {id:"prm1",type:"mostra",title:"Bowie Starman!",category:"arte",dateFrom:"2026-01-10",dateTo:"2026-04-06",orari:"Mar-Dom 10-18",location:"Centro Storico PR",cityKey:"parma",description:"Costumi, foto, memorabilia Bowie.",free:false,source:"Parma Welcome"},
  {id:"mo1",type:"evento",title:"Mercatino Bio",category:"food",date:"2026-03-15",time:"08:30–13",location:"Via Emilia MO",cityKey:"modena",description:"Bio e km zero. Ogni domenica.",free:true,source:"Virgilio"},
  {id:"mom1",type:"mostra",title:"Jori — Quadri Viventi",category:"arte",dateFrom:"2026-02-15",dateTo:"2026-04-15",orari:"Mar-Sab 10-19:30",location:"Galleria Mazzoli",cityKey:"modena",description:"25 opere pop art emiliana.",free:true,source:"Itinerari nell'Arte"},
];

function isOpen(m,d){return new Date(d)>=new Date(m.dateFrom)&&new Date(d)<=new Date(m.dateTo)}

// ══════════════ SVG ICONS for bottom bar (ReggioViva style) ══════════════
function BarIcon({type,active}){
  const c=active?"#1a1a1a":"#555";const w="2";const s={width:24,height:24,display:"block"};
  if(type==="home")return<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={w} strokeLinecap="round" strokeLinejoin="round"><path d="M3 10.5L12 3l9 7.5V21a1 1 0 01-1 1H4a1 1 0 01-1-1V10.5z"/><path d="M9 21V14h6v7"/></svg>;
  if(type==="map")return<svg style={s} viewBox="0 0 24 24" fill={active?"#1a1a1a":"none"} stroke={c} strokeWidth={w}><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5" fill={active?"#FCD34D":"none"} stroke={c}/></svg>;
  if(type==="fumetto")return<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={w} strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><circle cx="12" cy="12" r="3.5"/><circle cx="12" cy="12" r="1.2" fill={c}/><path d="M18 8h.01"/></svg>;
  if(type==="ads")return<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={w} strokeLinecap="round" strokeLinejoin="round"><path d="M12 18V6"/><path d="M8 10l-5 2v4l5 2"/><path d="M8 10V18"/><path d="M8 10l8-4v16l-8-4"/><path d="M19 10c1.1.9 2 2.3 2 4s-.9 3.1-2 4"/></svg>;
  if(type==="profile")return<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={w} strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
  return null;
}

function Badge({children,bg,color="#fff",style:s}){
  return<span style={{background:bg||"#1a1a1a",color,fontFamily:"'Passion One',sans-serif",fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:"uppercase",padding:"4px 12px",borderRadius:20,display:"inline-flex",alignItems:"center",gap:4,...(s||{})}}>{children}</span>;
}

function EventCard({event,onClick,saved,onSave}){
  const cc=CC[event.category]||{bg:"#666",label:"EVENTO",icon:"⚡"};
  const ill=CI[event.category]||CI.arte;
  const isMostra=event.type==="mostra";
  const perm=isMostra&&event.dateTo&&new Date(event.dateTo).getFullYear()>2026;
  const dateBadge=isMostra&&event.dateTo?(perm?"SEMPRE APERTO":"FINO AL "+new Date(event.dateTo).toLocaleDateString("it",{day:"numeric",month:"2-digit"})):null;
  const isSaved=saved?.includes(event.id);

  return(
    <div onClick={()=>onClick(event)} style={{borderRadius:20,overflow:"hidden",background:"#fff",border:"3px solid #1a1a1a",boxShadow:"4px 4px 0 #1a1a1a",cursor:"pointer",marginBottom:16}}>
      <div style={{height:190,background:ill,position:"relative",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{position:"absolute",inset:0,background:"radial-gradient(circle,rgba(0,0,0,.12) 1px,transparent 1px)",backgroundSize:"6px 6px",opacity:.35}}/>
        <div style={{fontSize:100,opacity:.25,transform:"rotate(-10deg)"}}>{cc.icon}</div>
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:70,background:"linear-gradient(transparent,rgba(0,0,0,.35))"}}/>
        <div style={{position:"absolute",top:14,left:14}}><Badge bg={cc.bg}>{cc.icon} {cc.label}</Badge></div>
        {dateBadge&&<div style={{position:"absolute",top:14,right:14}}><Badge bg={perm?"#059669":"#EA580C"}>{dateBadge}</Badge></div>}
        {event.free&&<div style={{position:"absolute",bottom:14,left:14,background:"#10B981",border:"2px solid #1a1a1a",borderRadius:10,padding:"2px 8px",fontSize:9,fontWeight:900,color:"#fff"}}>GRATIS</div>}
        {!event.free&&<div style={{position:"absolute",bottom:14,left:14,width:30,height:30,borderRadius:"50%",background:"#FCD34D",border:"2px solid #1a1a1a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900}}>€</div>}
      </div>
      <div style={{padding:"14px 18px 16px"}}>
        <div style={{fontFamily:"'Passion One',sans-serif",fontSize:21,fontWeight:700,textTransform:"uppercase",lineHeight:1.1,letterSpacing:.5}}>{event.title}</div>
        <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:"#777",marginTop:6,lineHeight:1.5}}>{event.description}</div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#aaa",flexWrap:"wrap"}}>
          {event.time&&<span>⏰ {event.time}</span>}
          {event.orari&&<span>🕐 {event.orari}</span>}
          <span>📍 {event.location}</span>
          <span style={{marginLeft:"auto",fontSize:11}}>{event.source}</span>
        </div>
      </div>
    </div>
  );
}

// ══════════════ MAIN APP ══════════════
function App(){
  const [city,setCity]=useState("reggio-emilia");
  const [cat,setCat]=useState("tutti");
  const [day,setDay]=useState(new Date().toISOString().slice(0,10));
  const [sel,setSel]=useState(null);
  const [tab,setTab]=useState("home");
  const [sq,setSq]=useState("");
  const [showMenu,setShowMenu]=useState(false);
  const [saved,setSaved]=useState([]);
  const [profTab,setProfTab]=useState("preferiti");
  const [settings,setSettings]=useState({notifiche:true,geo:true,raggio:"5km",tema:false});
  const [leafReady,setLeafReady]=useState(false);
  const [allEvents,setAllEvents]=useState(EVENTS);
  const mapRef=useRef(null);
  const mapObj=useRef(null);

  // Load events from JSON (fallback to hardcoded)
  useEffect(()=>{
    fetch("events.json").then(r=>r.json()).then(d=>{
      if(d.events&&d.events.length>0)setAllEvents(d.events);
    }).catch(()=>{});
  },[]);

  // Load saved
  useEffect(()=>{try{const s=JSON.parse(localStorage.getItem("eventoon_saved")||"[]");setSaved(s)}catch(e){}},[]);
  const toggleSave=(id)=>{
    setSaved(prev=>{const n=prev.includes(id)?prev.filter(x=>x!==id):[...prev,id];localStorage.setItem("eventoon_saved",JSON.stringify(n));return n;});
  };

  // Load Leaflet
  useEffect(()=>{
    if(window.L){setLeafReady(true);return}
    const l=document.createElement("link");l.rel="stylesheet";l.href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css";document.head.appendChild(l);
    const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";s.onload=()=>setLeafReady(true);document.head.appendChild(s);
  },[]);

  // Map render
  useEffect(()=>{
    if(tab!=="map"||!leafReady||!mapRef.current)return;
    const L=window.L;if(!L)return;
    const ci=CITIES[city];
    if(!mapObj.current){
      mapObj.current=L.map(mapRef.current,{zoomControl:false}).setView([ci.lat,ci.lng],13);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:'© OSM'}).addTo(mapObj.current);
    }
    mapObj.current.eachLayer(l=>{if(l instanceof L.Marker)mapObj.current.removeLayer(l)});
    const filtered=allEvents.filter(e=>e.cityKey===city&&(cat==="tutti"||e.category===cat));
    filtered.forEach(e=>{
      const co=COORDS[e.id];if(!co)return;
      const cc=CC[e.category]||{bg:"#666",icon:"⚡"};
      const ic=L.divIcon({className:'',html:'<div style="width:44px;height:44px;border-radius:50%;background:'+cc.bg+';border:3px solid #1a1a1a;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 3px 10px rgba(0,0,0,.3)">'+cc.icon+'</div>',iconSize:[44,44],iconAnchor:[22,22]});
      L.marker(co,{icon:ic}).addTo(mapObj.current).on('click',()=>setSel(e));
    });
    mapObj.current.setView([ci.lat,ci.lng],13);
  },[tab,city,cat,leafReady]);

  const c=CITIES[city];
  const allCity=allEvents.filter(e=>e.cityKey===city);
  const mostre=allCity.filter(e=>e.type==="mostra"&&isOpen(e,day)&&(cat==="tutti"||cat==="arte"||e.category===cat));
  const eventi=allCity.filter(e=>e.type==="evento"&&e.date===day&&(cat==="tutti"||e.category===cat));
  const tot=mostre.length+eventi.length;
  const sRes=sq.length>=2?allCity.filter(e=>(e.title+" "+e.description+" "+(e.location||"")).toLowerCase().indexOf(sq.toLowerCase())>=0):allCity;
  const savedEvents=allEvents.filter(e=>saved.includes(e.id));
  const mapCount=allEvents.filter(e=>e.cityKey===city&&(cat==="tutti"||e.category===cat)).length;

  const catBtns=[{id:"tutti",label:"Tutti",icon:"🎪"},{id:"musica",label:"Concerti",icon:"🎵"},{id:"sport",label:"Sport",icon:"⚽"},{id:"arte",label:"Arte",icon:"🎨"},{id:"food",label:"Food",icon:"🍕"},{id:"mercati",label:"Mercati",icon:"🏺"}];

  return(
<div style={{minHeight:"100vh",background:"#FFFEF8",display:"flex",flexDirection:"column",fontFamily:"'DM Sans',sans-serif"}}>
  <style>{`
    @import url('https://fonts.googleapis.com/css2?family=Passion+One:wght@400;700;900&family=DM+Sans:wght@400;500;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:#FFFEF8}
    ::-webkit-scrollbar{display:none}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .leaflet-control-attribution{font-size:8px!important;opacity:.4}
  `}</style>

  {/* ══════ HEADER ══════ */}
  <div style={{position:"sticky",top:0,zIndex:50,background:"#FCD34D",borderBottom:"3px solid #1a1a1a",paddingTop:"env(safe-area-inset-top,8px)"}}>
    <div style={{padding:"8px 18px 10px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:36,height:36,borderRadius:10,background:"#1a1a1a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#FCD34D",fontFamily:"'Passion One',sans-serif",fontWeight:900}}>E!</div>
        <span style={{fontFamily:"'Passion One',sans-serif",fontSize:26,fontWeight:900}}><span style={{color:"#1a1a1a"}}>EVENTO</span><span style={{color:"#DC2626"}}>ON!</span></span>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <div onClick={()=>setShowMenu(!showMenu)} style={{background:"#1a1a1a",color:"#FCD34D",borderRadius:10,padding:"5px 12px",fontFamily:"'Passion One',sans-serif",fontSize:13,letterSpacing:1,cursor:"pointer"}}>{c.short} ▾</div>
        <div style={{width:36,height:36,borderRadius:"50%",background:"#1a1a1a",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><span style={{fontSize:16}}>🔔</span></div>
      </div>
    </div>
  </div>

  {/* City menu */}
  {showMenu&&<div style={{position:"fixed",inset:0,zIndex:200}} onClick={()=>setShowMenu(false)}>
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.4)",animation:"fadeIn .15s"}}/>
    <div onClick={e=>e.stopPropagation()} style={{position:"absolute",top:60,right:16,background:"#fff",borderRadius:16,border:"3px solid #1a1a1a",boxShadow:"4px 4px 0 #1a1a1a",width:220,overflow:"hidden"}}>
      {Object.entries(CITIES).map(([k,ci])=>(
        <div key={k} onClick={()=>{setCity(k);setShowMenu(false);setCat("tutti")}} style={{padding:"13px 18px",background:city===k?"#1a1a1a":"#fff",color:city===k?"#FCD34D":"#1a1a1a",fontFamily:"'Passion One',sans-serif",fontSize:17,letterSpacing:1,cursor:"pointer",borderBottom:"1.5px solid #eee"}}>{ci.name}{city===k&&" ✓"}</div>
      ))}
    </div>
  </div>}

  {/* ══════ CONTENT ══════ */}
  <div style={{flex:1,overflowY:tab==="map"?"hidden":"auto",padding:tab==="map"?"0":"0 0 100px",WebkitOverflowScrolling:"touch",position:"relative",zIndex:1,display:"flex",flexDirection:"column"}}>

    {/* ══════ HOME ══════ */}
    {tab==="home"&&<div style={{padding:"14px 16px 0"}}>

              boxShadow:"2px 2px 0 #1a1a1a",
              marginBottom:isCenter?-6:0,
              transform:isCenter?"scale(1.1)":"none",
            }}>
              <BarIcon type={t.type} active={true}/>
              <div style={{fontFamily:"'Passion One',sans-serif",fontSize:8,letterSpacing:1.5,color:"#1a1a1a",marginTop:2}}>{t.label}</div>
            </div>
          ):(
            <div style={{padding:"8px 4px 2px",display:"inline-flex",flexDirection:"column",alignItems:"center"}}>
              <BarIcon type={t.type} active={false}/>
              <div style={{fontFamily:"'Passion One',sans-serif",fontSize:8,letterSpacing:1.2,color:"#888",marginTop:3}}>{t.label}</div>
            </div>
          )}
        </div>
      );
    })}
  </div>

</div>);
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>

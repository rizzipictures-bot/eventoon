      <div style={{background:"#FCD34D",padding:"16px 18px",borderBottom:"3px solid #1a1a1a",textAlign:"center"}}>
        <div style={{fontSize:36}}>{"\ud83d\udce2"}</div>
        <div style={{fontFamily:P,fontStyle:"italic",fontSize:28,letterSpacing:2}}>PROMUOVI</div>
        <div style={{fontSize:13,color:"#333",marginTop:4}}>Raggiungi migliaia di persone con la tua inserzione</div>
      </div>
      <div style={{padding:"18px 16px"}}>
        <button style={{width:"100%",background:"#DC2626",color:"#fff",border:"3px solid #1a1a1a",borderRadius:16,padding:16,fontFamily:P,fontStyle:"italic",fontSize:22,letterSpacing:2,cursor:"pointer",boxShadow:"4px 4px 0 #1a1a1a",marginBottom:14}}>+ CREA INSERZIONE</button>
        <div style={{display:"flex",gap:10,marginBottom:14}}>
          {[["3 giorni","\u20ac9,90",false],["7 giorni","\u20ac19,90",true],["30 giorni","\u20ac49,90",false]].map(function(arr,i){return (
            <div key={i} style={{flex:1,background:"#fff",border:"3px solid #1a1a1a",borderRadius:16,padding:"14px 6px",textAlign:"center",position:"relative",boxShadow:"3px 3px 0 #1a1a1a"}}>
              {arr[2] && <div style={{position:"absolute",top:-10,left:"50%",transform:"translateX(-50%)",background:"#FCD34D",border:"2px solid #1a1a1a",borderRadius:10,padding:"2px 10px",fontFamily:P,fontStyle:"italic",fontSize:9,whiteSpace:"nowrap"}}>PI\u00d9 SCELTO</div>}
              <div style={{fontSize:13,fontWeight:600}}>{arr[0]}</div>
              <div style={{fontFamily:P,fontStyle:"italic",fontSize:arr[2]?26:22,color:"#DC2626",marginTop:4}}>{arr[1]}</div>
            </div>
          )})}
        </div>
        <div style={{background:"#E0F2FE",border:"3px solid #1a1a1a",borderRadius:18,padding:"14px 18px",marginBottom:20,boxShadow:"3px 3px 0 #1a1a1a"}}>
          <div style={{fontFamily:P,fontStyle:"italic",fontSize:15,marginBottom:6}}>Categorie ammesse</div>
          <div style={{fontSize:14,color:"#555",lineHeight:1.8}}>{"\ud83c\udfb5"} Concerti {"\u00b7"} {"\ud83d\udcda"} Corsi & Workshop {"\u00b7"} {"\ud83c\udf55"} Ristoranti & Locali {"\u00b7"} {"\ud83c\udf19"} Vita Notturna {"\u00b7"} {"\ud83d\udc76"} Bambini</div>
        </div>
        <div style={{fontFamily:P,fontStyle:"italic",fontSize:20,letterSpacing:2,marginBottom:6,borderBottom:"3px solid #FCD34D",paddingBottom:6}}>INSERZIONI ATTIVE</div>
        <div style={{textAlign:"center",padding:"36px 20px"}}><div style={{fontSize:56}}>{"\ud83d\udced"}</div><div style={{fontFamily:P,fontStyle:"italic",fontSize:17,marginTop:8}}>Nessuna inserzione attiva.</div><div style={{fontSize:14,color:"#999",marginTop:4}}>Sii il primo a promuoverti!</div></div>
      </div>
    </div>}

    {/* PROFILE */}
    {tab==="profile" && <div>
      <div style={{background:"#FCD34D",padding:"12px 18px",borderBottom:"3px solid #1a1a1a"}}>
        <div style={{fontFamily:P,fontStyle:"italic",fontSize:24,letterSpacing:2}}>{"\ud83d\udc64"} PROFILO</div>
      </div>
      <div style={{padding:"14px 16px"}}>
        <div style={{background:"#fff",border:"3px solid #1a1a1a",borderRadius:20,padding:"22px 18px",textAlign:"center",marginBottom:14,boxShadow:"4px 4px 0 #1a1a1a"}}>
          <div style={{width:70,height:70,borderRadius:"50%",background:"#FCD34D",border:"4px solid #1a1a1a",margin:"0 auto 10px",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontFamily:P,fontStyle:"italic",fontSize:22,color:"#1a1a1a"}}>E!</span></div>
          <div style={{fontFamily:P,fontStyle:"italic",fontSize:22}}>Utente EVENTOON!</div>
          <div style={{fontSize:14,color:"#999",marginTop:4}}>{"\ud83d\udccd"} {c.n}</div>
          <div style={{borderTop:"1.5px solid #eee",marginTop:14,paddingTop:14,display:"flex",justifyContent:"space-around"}}>
            {[[svEv.length,"Preferiti"],["0","Fumetti"],["1","Citt\u00e0"]].map(function(arr,i){return (
              <div key={i} style={{textAlign:"center",flex:1,borderRight:i<2?"1.5px solid #eee":"none"}}><div style={{fontFamily:P,fontStyle:"italic",fontSize:26}}>{arr[0]}</div><div style={{fontSize:12,color:"#999"}}>{arr[1]}</div></div>
            )})}
          </div>
        </div>
        <div style={{display:"flex",marginBottom:14,border:"3px solid #1a1a1a",borderRadius:14,overflow:"hidden"}}>
          <div onClick={function(){setPt("pref")}} style={{flex:1,padding:11,textAlign:"center",background:pt==="pref"?"#FCD34D":"#fff",fontFamily:P,fontStyle:"italic",fontSize:14,cursor:"pointer"}}>{"\u2605"} Preferiti</div>
          <div onClick={function(){setPt("fum")}} style={{flex:1,padding:11,textAlign:"center",background:pt==="fum"?"#FCD34D":"#fff",fontFamily:P,fontStyle:"italic",fontSize:14,cursor:"pointer",borderLeft:"3px solid #1a1a1a"}}>{"\ud83c\udfa8"} I miei fumetti</div>
        </div>
        {pt==="pref" && (svEv.length>0?<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {svEv.map(function(e){var cc=CC[getCat(e)]||{bg:"#666",i:"\u26a1"};return (
            <div key={e.id} onClick={function(){setSel(e)}} style={{background:"#fff",border:"2.5px solid #1a1a1a",borderRadius:14,overflow:"hidden",cursor:"pointer",boxShadow:"3px 3px 0 #1a1a1a"}}>
              <div style={{height:60,position:"relative"}}><ComicSVG cat={getCat(e)}/><div style={{position:"absolute",top:6,left:6,width:24,height:24,borderRadius:8,background:cc.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,border:"2px solid #1a1a1a"}}>{cc.i}</div></div>
              <div style={{padding:"8px 10px"}}><div style={{fontFamily:P,fontStyle:"italic",fontSize:13,lineHeight:1.2}}>{e.ti||e.title}</div><div style={{fontSize:10,color:"#999",marginTop:2}}>{e.lo||e.location}</div></div>
            </div>
          )})}
        </div>:<div style={{textAlign:"center",padding:30,color:"#ccc"}}><div style={{fontSize:32}}>{"\u2b50"}</div>Nessun evento salvato</div>)}
        {pt==="fum" && <div style={{textAlign:"center",padding:30,color:"#ccc"}}><div style={{fontSize:32}}>{"\ud83c\udfa8"}</div>Nessun fumetto creato</div>}

        <div style={{fontFamily:P,fontStyle:"italic",fontSize:16,letterSpacing:2,color:"#999",marginTop:20,marginBottom:8}}>{"\u2699\ufe0f"} IMPOSTAZIONI</div>
        <div style={{background:"#fff",border:"3px solid #1a1a1a",borderRadius:18,overflow:"hidden",marginBottom:14,boxShadow:"3px 3px 0 #1a1a1a"}}>
          {[{k:"not",l:"\ud83d\udd14 Notifiche eventi",d:"Avvisi per eventi nelle vicinanze"},{k:"geo",l:"\ud83d\udccd Geolocalizzazione",d:"Mostra eventi vicino a te"}].map(function(item,i){return (
            <div key={i} style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1.5px solid #eee"}}>
              <div><div style={{fontWeight:600,fontSize:14}}>{item.l}</div><div style={{fontSize:12,color:"#999",marginTop:1}}>{item.d}</div></div>
              <div onClick={function(){setSett(function(p){var n={};for(var x in p)n[x]=p[x];n[item.k]=!p[item.k];return n})}} style={{width:50,height:26,borderRadius:13,background:sett[item.k]?"#FCD34D":"#ddd",border:"2px solid #1a1a1a",position:"relative",cursor:"pointer"}}>
                <div style={{width:20,height:20,borderRadius:10,background:"#1a1a1a",position:"absolute",top:1,left:sett[item.k]?26:2,transition:"left .2s"}}/>
              </div>
            </div>
          )})}
          <div style={{padding:"14px 16px",borderBottom:"1.5px solid #eee"}}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:8}}>{"\ud83d\udccf"} Raggio di ricerca</div>
            <div style={{display:"flex",gap:8}}>
              {["500m","1km","5km","10km"].map(function(r){return (
                <div key={r} onClick={function(){setSett(function(p){var n={};for(var x in p)n[x]=p[x];n.rag=r;return n})}} style={{flex:1,textAlign:"center",padding:7,borderRadius:20,border:"2px solid #1a1a1a",background:sett.rag===r?"#FCD34D":"#fff",fontFamily:P,fontStyle:"italic",fontSize:13,cursor:"pointer"}}>{r}</div>
              )})}
            </div>
          </div>
          <div style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontWeight:600,fontSize:14}}>{"\ud83c\udf19"} Tema scuro</div><div style={{fontSize:12,color:"#999",marginTop:1}}>Modalit\u00e0 notte</div></div>
            <div onClick={function(){setSett(function(p){var n={};for(var x in p)n[x]=p[x];n.dark=!p.dark;return n})}} style={{width:50,height:26,borderRadius:13,background:sett.dark?"#FCD34D":"#ddd",border:"2px solid #1a1a1a",position:"relative",cursor:"pointer"}}>
              <div style={{width:20,height:20,borderRadius:10,background:sett.dark?"#1a1a1a":"#aaa",position:"absolute",top:1,left:sett.dark?26:2,transition:"left .2s"}}/>
            </div>
          </div>
        </div>
        <div style={{fontFamily:P,fontStyle:"italic",fontSize:16,letterSpacing:2,color:"#999",marginBottom:8}}>{"\ud83d\udee0\ufe0f"} STRUMENTI ADMIN</div>
        <div style={{background:"#fff",border:"3px solid #1a1a1a",borderRadius:18,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,cursor:"pointer",boxShadow:"3px 3px 0 #1a1a1a"}}>
          <div><div style={{fontWeight:600,fontSize:14}}>{"\ud83d\udce1"} RSS Aggregator</div><div style={{fontSize:12,color:"#999",marginTop:1}}>Aggiorna eventi dai giornali</div></div>
          <span>{"\u2192"}</span>
        </div>
        <div style={{textAlign:"center",padding:"16px 0",color:"#ccc",fontSize:12}}>EVENTOON! v1.0 {"\u2014"} La tua citt\u00e0, a fumetti</div>
      </div>
    </div>}

  </div>

  {/* DETAIL */}
  {sel && <div style={{position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"flex-end"}}>
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)",animation:"fi .15s"}} onClick={function(){setSel(null)}}/>
    <div style={{position:"relative",zIndex:1,width:"100%",background:"#fff",borderRadius:"22px 22px 0 0",maxHeight:"85vh",overflowY:"auto",animation:"su .3s cubic-bezier(.32,.72,.37,1.05)",paddingBottom:24,border:"3px solid #1a1a1a",borderBottom:"none"}}>
      <div style={{padding:"10px 0 4px",textAlign:"center"}}><div style={{width:40,height:5,background:"#ddd",borderRadius:3,margin:"0 auto"}}/></div>
      <div style={{padding:"0 18px"}}>
        {(function(){var cc=CC[getCat(sel)]||{bg:"#666",i:"\u26a1",l:"EVENTO"};return <Bdg bg={cc.bg}>{cc.i} {cc.l}</Bdg>})()}
        <div style={{fontFamily:P,fontStyle:"italic",fontSize:26,textTransform:"uppercase",lineHeight:1.1,marginTop:8}}>{sel.ti||sel.title}</div>
        <div style={{fontSize:14,color:"#555",lineHeight:1.7,marginTop:8}}>{sel.de||sel.description}</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:10}}>
          <span style={{background:"#FCD34D",border:"2px solid #1a1a1a",borderRadius:12,padding:"4px 12px",fontSize:12,fontWeight:600}}>{"\ud83d\udccd"} {sel.lo||sel.location}</span>
          {(sel.tm||sel.time) && <span style={{background:"#fff",border:"2px solid #1a1a1a",borderRadius:12,padding:"4px 12px",fontSize:12}}>{"\u23f0"} {sel.tm||sel.time}</span>}
          {(sel.or||sel.orari) && <span style={{background:"#fff",border:"2px solid #1a1a1a",borderRadius:12,padding:"4px 12px",fontSize:12}}>{"\ud83d\udd50"} {sel.or||sel.orari}</span>}
          {sel.fr && <span style={{background:"#10B981",color:"#fff",border:"2px solid #1a1a1a",borderRadius:12,padding:"4px 12px",fontSize:12,fontWeight:700}}>GRATIS</span>}
        </div>
        <div style={{display:"flex",gap:10,marginTop:14}}>
          <button onClick={function(){window.open("https://maps.google.com/maps?q="+encodeURIComponent((sel.lo||sel.location)+(c?", "+c.n:"")),"_blank")}} style={{flex:1,background:"#1a1a1a",color:"#FCD34D",border:"3px solid #1a1a1a",borderRadius:14,padding:13,fontFamily:P,fontStyle:"italic",fontSize:15,cursor:"pointer"}}>MAPPA</button>
          <button onClick={function(){tgSv(sel.id)}} style={{flex:1,background:sv.includes(sel.id)?"#DC2626":"#FCD34D",color:sv.includes(sel.id)?"#fff":"#1a1a1a",border:"3px solid #1a1a1a",borderRadius:14,padding:13,fontFamily:P,fontStyle:"italic",fontSize:15,cursor:"pointer"}}>{sv.includes(sel.id)?"\u2713 SALVATO":"\u2764\ufe0f SALVA"}</button>
        </div>
        <div style={{display:"flex",gap:10,marginTop:8}}>
          <button onClick={function(){window.open("https://wa.me/?text="+encodeURIComponent((sel.ti||sel.title)+"\n"+(sel.lo||sel.location)+"\n"+((sel.tm||sel.time||sel.or||sel.orari)||"")+"\n\nScoperto su EVENTOON!"),"_blank")}} style={{flex:1,background:"#25D366",color:"#fff",border:"3px solid #1a1a1a",borderRadius:14,padding:11,fontFamily:P,fontStyle:"italic",fontSize:13,cursor:"pointer"}}>WHATSAPP</button>
          <button onClick={function(){if(navigator.clipboard)navigator.clipboard.writeText((sel.ti||sel.title)+" \u2014 "+(sel.lo||sel.location)+" | EVENTOON!");alert("Copiato!")}} style={{flex:1,background:"#fff",border:"3px solid #1a1a1a",borderRadius:14,padding:11,fontFamily:P,fontStyle:"italic",fontSize:13,cursor:"pointer"}}>{"\ud83d\udccb"} COPIA</button>
        </div>
      </div>
    </div>
  </div>}

  {/* BOTTOM BAR */}
  <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"3px solid #1a1a1a",display:"flex",justifyContent:"space-around",alignItems:"flex-end",padding:"4px 2px 0",paddingBottom:"calc(4px + env(safe-area-inset-bottom,12px))",zIndex:60}}>
    {[{id:"home",tp:"home",lb:"HOME"},{id:"map",tp:"map",lb:"MAPPA"},{id:"fumetto",tp:"fumetto",lb:"FUMETTO"},{id:"ads",tp:"ads",lb:"ADS"},{id:"profile",tp:"profile",lb:"PROFILO"}].map(function(t){
      var isA=tab===t.id;
      return (
        <div key={t.id} onClick={function(){setTab(t.id);setSel(null);if(t.id==="map"&&mO.current)setTimeout(function(){mO.current.invalidateSize()},150)}} style={{textAlign:"center",cursor:"pointer",minWidth:60}}>
          {isA?(
            <div style={{background:"#FCD34D",border:"3px solid #1a1a1a",borderRadius:18,padding:"8px 10px 4px",display:"inline-flex",flexDirection:"column",alignItems:"center",boxShadow:"2px 2px 0 #1a1a1a"}}>
              <BI type={t.tp} active={true}/>
              <div style={{fontFamily:P,fontStyle:"italic",fontSize:11,letterSpacing:1,color:"#1a1a1a",marginTop:1}}>{t.lb}</div>
            </div>
          ):(
            <div style={{padding:"8px 4px 4px",display:"inline-flex",flexDirection:"column",alignItems:"center"}}>
              <BI type={t.tp} active={false}/>
              <div style={{fontFamily:P,fontStyle:"italic",fontSize:11,letterSpacing:1,color:"#888",marginTop:2}}>{t.lb}</div>
            </div>
          )}
        </div>
      );
    })}
  </div>

</div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>

  if(cat==="musica")return <svg style={s} viewBox="0 0 400 150" preserveAspectRatio="xMidYMid slice"><rect width="400" height="150" fill="#DC2626"/><circle cx="100" cy="100" r="20" fill="#1a1a1a" opacity=".15"/><circle cx="100" cy="100" r="6" fill="#DC2626"/><line x1="120" y1="100" x2="120" y2="30" stroke="#1a1a1a" strokeWidth="3" opacity=".15"/><path d="M120 30 Q140 25 140 40 Q140 50 120 45" fill="#1a1a1a" opacity=".15"/><circle cx="280" cy="80" r="18" fill="#1a1a1a" opacity=".15"/><circle cx="280" cy="80" r="5" fill="#DC2626"/><line x1="298" y1="80" x2="298" y2="20" stroke="#1a1a1a" strokeWidth="3" opacity=".15"/><path d="M250 50 Q260 30 270 50 Q280 70 290 50 Q300 30 310 50" fill="none" stroke="#fff" strokeWidth="2" opacity=".2"/><path d="M60 40 Q80 20 100 40 Q120 60 140 40" fill="none" stroke="#fff" strokeWidth="1.5" opacity=".15"/></svg>;
  if(cat==="arte")return <svg style={s} viewBox="0 0 400 150" preserveAspectRatio="xMidYMid slice"><defs><linearGradient id="ag" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#7C3AED"/><stop offset="50%" stopColor="#DC2626"/><stop offset="100%" stopColor="#F59E0B"/></linearGradient></defs><rect width="400" height="150" fill="url(#ag)"/><rect x="70" y="25" width="70" height="90" rx="3" fill="none" stroke="#fff" strokeWidth="3" opacity=".25"/><rect x="80" y="35" width="50" height="60" fill="#fff" opacity=".08"/><circle cx="250" cy="75" r="30" fill="none" stroke="#fff" strokeWidth="2.5" opacity=".2"/><path d="M235 90 Q250 50 265 90" fill="none" stroke="#fff" strokeWidth="2" opacity=".2"/><path d="M310 40 L340 110 M325 40 L295 110" stroke="#fff" strokeWidth="2" opacity=".15"/><circle cx="350" cy="40" r="15" fill="#fff" opacity=".08"/></svg>;

function Badge({children,bg,color,style:st}){
  return <span style={{background:bg||"#1a1a1a",color:color||"#fff",fontFamily:"'Passion One',sans-serif",fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:"uppercase",padding:"4px 12px",borderRadius:20,display:"inline-flex",alignItems:"center",gap:4,...(st||{})}}>{children}</span>;
}

function EventCard({event,onClick}){
  const cc=CC[event.category]||{bg:"#666",label:"EVENTO",icon:"⚡"};
  const isMostra=event.type==="mostra";
  const perm=isMostra&&event.dateTo&&new Date(event.dateTo).getFullYear()>2026;
  const dateBadge=isMostra&&event.dateTo?(perm?"SEMPRE APERTO":"FINO AL "+new Date(event.dateTo).toLocaleDateString("it",{day:"numeric",month:"2-digit"})):null;
  return(
    <div onClick={()=>onClick(event)} style={{borderRadius:18,overflow:"hidden",background:"#fff",border:"3px solid #1a1a1a",boxShadow:"4px 4px 0 #1a1a1a",cursor:"pointer",marginBottom:14}}>
      <div style={{height:130,position:"relative",overflow:"hidden"}}>
        <ComicScene cat={event.category} w={400} h={130}/>
        <div style={{position:"absolute",inset:0,background:"radial-gradient(circle,rgba(0,0,0,.1) 1px,transparent 1px)",backgroundSize:"5px 5px",opacity:.4}}/>
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:50,background:"linear-gradient(transparent,rgba(0,0,0,.3))"}}/>
        <div style={{position:"absolute",top:10,left:10}}><Badge bg={cc.bg}>{cc.icon} {cc.label}</Badge></div>
        {dateBadge&&<div style={{position:"absolute",top:10,right:10}}><Badge bg={perm?"#059669":"#EA580C"}>{dateBadge}</Badge></div>}
        {event.free&&<div style={{position:"absolute",bottom:10,left:10,background:"#10B981",border:"2px solid #1a1a1a",borderRadius:10,padding:"2px 8px",fontSize:9,fontWeight:900,color:"#fff"}}>GRATIS</div>}
        {!event.free&&<div style={{position:"absolute",bottom:10,left:10,width:28,height:28,borderRadius:"50%",background:"#FCD34D",border:"2px solid #1a1a1a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900}}>€</div>}
      </div>
      <div style={{padding:"12px 16px 14px"}}>
        <div style={{fontFamily:"'Passion One',sans-serif",fontSize:20,fontWeight:700,textTransform:"uppercase",lineHeight:1.1,letterSpacing:.5}}>{event.title}</div>
        <div style={{fontSize:13,color:"#777",marginTop:5,lineHeight:1.5}}>{event.description}</div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8,fontSize:12,color:"#aaa",flexWrap:"wrap"}}>
          {event.time&&<span>⏰ {event.time}</span>}
          {event.orari&&<span>🕐 {event.orari}</span>}
          <span>📍 {event.location}</span>
          <span style={{marginLeft:"auto",fontSize:11}}>{event.source}</span>
        </div>
      </div>
    </div>
  );
}

  if(type==="ads")return <svg style={s} viewBox="0 0 24 24" fill={c} stroke="none"><path d="M18 11v2h4v-2h-4zm-2 6.46l2.95 2.19.75-1.3L16 16v1.46zM16 8l3.7-2.35-.75-1.3L16 6.54V8zM3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>;

function App(){
  const [city,setCity]=useState("reggio-emilia");
  const [cat,setCat]=useState("tutti");
  const [day,setDay]=useState(new Date().toISOString().slice(0,10));
  const [sel,setSel]=useState(null);
  const [tab,setTab]=useState("home");
  const [sq,setSq]=useState("");
  const [showMenu,setShowMenu]=useState(false);
  const [showSearch,setShowSearch]=useState(false);
  const [showSaved,setShowSaved]=useState(false);
  const [saved,setSaved]=useState([]);
  const [profTab,setProfTab]=useState("preferiti");
  const [settings,setSettings]=useState({notifiche:true,geo:true,raggio:"5km",tema:false});
  const [allEvents,setAllEvents]=useState(FALLBACK_EVENTS);
  const mapRef=useRef(null);
  const mapObj=useRef(null);

  useEffect(()=>{try{setSaved(JSON.parse(localStorage.getItem("eventoon_saved")||"[]"))}catch(e){}},[]);
  useEffect(()=>{fetch("events.json").then(r=>r.json()).then(d=>{if(d.events&&d.events.length>0)setAllEvents(d.events)}).catch(()=>{})},[]);

  const toggleSave=(id)=>{setSaved(p=>{const n=p.includes(id)?p.filter(x=>x!==id):[...p,id];localStorage.setItem("eventoon_saved",JSON.stringify(n));return n})};

  // Map
  useEffect(()=>{
    if(tab!=="map"||!mapRef.current||!window.L)return;
    if(!mapObj.current){
      const ci=CITIES[city];
      mapObj.current=window.L.map(mapRef.current,{zoomControl:false}).setView([ci.lat,ci.lng],13);
      window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OSM"}).addTo(mapObj.current);
      setTimeout(()=>mapObj.current.invalidateSize(),200);
    }
    const L=window.L;const ci=CITIES[city];
    mapObj.current.eachLayer(l=>{if(l instanceof L.Marker)mapObj.current.removeLayer(l)});
    allEvents.filter(e=>e.cityKey===city&&(cat==="tutti"||e.category===cat)).forEach(e=>{
      const co=COORDS[e.id];if(!co)return;

          {[{k:"notifiche",l:"🔔 Notifiche eventi",d:"Avvisi per eventi nelle vicinanze"},{k:"geo",l:"📍 Geolocalizzazione",d:"Mostra eventi vicino a te"}].map((item,i)=>(
            <div key={i} style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1.5px solid #eee"}}>
              <div><div style={{fontWeight:600,fontSize:14}}>{item.l}</div><div style={{fontSize:12,color:"#999",marginTop:1}}>{item.d}</div></div>
              <div onClick={()=>setSettings(p=>({...p,[item.k]:!p[item.k]}))} style={{width:50,height:26,borderRadius:13,background:settings[item.k]?"#FCD34D":"#ddd",border:"2px solid #1a1a1a",position:"relative",cursor:"pointer"}}>
                <div style={{width:20,height:20,borderRadius:10,background:"#1a1a1a",position:"absolute",top:1,left:settings[item.k]?26:2,transition:"left .2s"}}/>
              </div>
            </div>
          ))}
          <div style={{padding:"14px 16px",borderBottom:"1.5px solid #eee"}}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:8}}>📏 Raggio di ricerca</div>
            <div style={{display:"flex",gap:8}}>
              {["500m","1km","5km","10km"].map(r=>(
                <div key={r} onClick={()=>setSettings(p=>({...p,raggio:r}))} style={{flex:1,textAlign:"center",padding:"7px",borderRadius:20,border:"2px solid #1a1a1a",background:settings.raggio===r?"#FCD34D":"#fff",fontFamily:"'Passion One',sans-serif",fontSize:13,cursor:"pointer"}}>{r}</div>
              ))}
            </div>
          </div>
          <div style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontWeight:600,fontSize:14}}>🌙 Tema scuro</div><div style={{fontSize:12,color:"#999",marginTop:1}}>Modalità notte</div></div>
            <div onClick={()=>setSettings(p=>({...p,tema:!p.tema}))} style={{width:50,height:26,borderRadius:13,background:settings.tema?"#FCD34D":"#ddd",border:"2px solid #1a1a1a",position:"relative",cursor:"pointer"}}>
              <div style={{width:20,height:20,borderRadius:10,background:settings.tema?"#1a1a1a":"#aaa",position:"absolute",top:1,left:settings.tema?26:2,transition:"left .2s"}}/>
            </div>
          </div>
        </div>

        <div style={{fontFamily:"'Passion One',sans-serif",fontSize:16,letterSpacing:2,color:"#999",marginBottom:8}}>🛠️ STRUMENTI ADMIN</div>
        <div style={{background:"#fff",border:"3px solid #1a1a1a",borderRadius:18,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,cursor:"pointer",boxShadow:"3px 3px 0 #1a1a1a"}}>
          <div><div style={{fontWeight:600,fontSize:14}}>📡 RSS Aggregator</div><div style={{fontSize:12,color:"#999",marginTop:1}}>Aggiorna eventi dai giornali locali</div></div>
          <span style={{fontSize:18}}>→</span>
        </div>
        <div style={{textAlign:"center",padding:"16px 0 8px",color:"#ccc"}}><div style={{fontSize:12}}>EVENTOON! v1.0 — La tua città, a fumetti</div></div>
      </div>
    </div>}

  </div>

  {/* DETAIL */}
  {sel&&<div style={{position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"flex-end"}}>
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)",animation:"fadeIn .15s"}} onClick={()=>setSel(null)}/>
    <div style={{position:"relative",zIndex:1,width:"100%",background:"#fff",borderRadius:"22px 22px 0 0",maxHeight:"85vh",overflowY:"auto",animation:"slideUp .3s cubic-bezier(.32,.72,.37,1.05)",paddingBottom:24,border:"3px solid #1a1a1a",borderBottom:"none"}}>
      <div style={{padding:"10px 0 4px",textAlign:"center"}}><div style={{width:40,height:5,background:"#ddd",borderRadius:3,margin:"0 auto"}}/></div>
      <div style={{padding:"0 18px"}}>
        <Badge bg={(CC[sel.category]||{bg:"#666"}).bg}>{(CC[sel.category]||{icon:"⚡"}).icon} {(CC[sel.category]||{label:"EVENTO"}).label}</Badge>
        <div style={{fontFamily:"'Passion One',sans-serif",fontSize:26,textTransform:"uppercase",lineHeight:1.1,marginTop:8,letterSpacing:.5}}>{sel.title}</div>
        <div style={{fontSize:14,color:"#555",lineHeight:1.7,marginTop:8}}>{sel.description}</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:10}}>
          <span style={{background:"#FCD34D",border:"2px solid #1a1a1a",borderRadius:12,padding:"4px 12px",fontSize:12,fontWeight:600}}>📍 {sel.location}</span>
          {sel.time&&<span style={{background:"#fff",border:"2px solid #1a1a1a",borderRadius:12,padding:"4px 12px",fontSize:12}}>⏰ {sel.time}</span>}
          {sel.orari&&<span style={{background:"#fff",border:"2px solid #1a1a1a",borderRadius:12,padding:"4px 12px",fontSize:12}}>🕐 {sel.orari}</span>}
          {sel.free&&<span style={{background:"#10B981",color:"#fff",border:"2px solid #1a1a1a",borderRadius:12,padding:"4px 12px",fontSize:12,fontWeight:700}}>GRATIS</span>}
        </div>
        <div style={{display:"flex",gap:10,marginTop:14}}>
          <button onClick={()=>window.open("https://maps.google.com/maps?q="+encodeURIComponent(sel.location),"_blank")} style={{flex:1,background:"#1a1a1a",color:"#FCD34D",border:"3px solid #1a1a1a",borderRadius:14,padding:13,fontFamily:"'Passion One',sans-serif",fontSize:15,letterSpacing:1,cursor:"pointer"}}>MAPPA</button>
          <button onClick={()=>toggleSave(sel.id)} style={{flex:1,background:saved.includes(sel.id)?"#DC2626":"#FCD34D",color:saved.includes(sel.id)?"#fff":"#1a1a1a",border:"3px solid #1a1a1a",borderRadius:14,padding:13,fontFamily:"'Passion One',sans-serif",fontSize:15,letterSpacing:1,cursor:"pointer"}}>{saved.includes(sel.id)?"✓ SALVATO":"❤️ SALVA"}</button>
        </div>
        <div style={{display:"flex",gap:10,marginTop:8}}>
          <button onClick={()=>window.open("https://wa.me/?text="+encodeURIComponent(sel.title+"\n"+sel.location+"\n"+(sel.time||sel.orari||"")+"\n\nScoperto su EVENTOON!"),"_blank")} style={{flex:1,background:"#25D366",color:"#fff",border:"3px solid #1a1a1a",borderRadius:14,padding:11,fontFamily:"'Passion One',sans-serif",fontSize:13,letterSpacing:1,cursor:"pointer"}}>WHATSAPP</button>
          <button onClick={()=>{navigator.clipboard&&navigator.clipboard.writeText(sel.title+" — "+sel.location+" | EVENTOON!");alert("Copiato!")}} style={{flex:1,background:"#fff",border:"3px solid #1a1a1a",borderRadius:14,padding:11,fontFamily:"'Passion One',sans-serif",fontSize:13,letterSpacing:1,cursor:"pointer"}}>📋 COPIA</button>
        </div>
      </div>
    </div>
  </div>}

  {/* BOTTOM BAR - white bg, filled gray icons, yellow pill active, bigger */}
  <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"3px solid #1a1a1a",display:"flex",justifyContent:"space-around",alignItems:"flex-end",padding:"4px 2px 0",paddingBottom:"calc(4px + env(safe-area-inset-bottom,12px))",zIndex:60}}>
    {[{id:"home",type:"home",label:"HOME"},{id:"map",type:"map",label:"MAPPA"},{id:"fumetto",type:"fumetto",label:"FUMETTO"},{id:"ads",type:"ads",label:"ADS"},{id:"profile",type:"profile",label:"PROFILO"}].map(t=>{
      const isA=tab===t.id;
      return(
        <div key={t.id} onClick={()=>{setTab(t.id);setSel(null);if(t.id==="map"&&mapObj.current)setTimeout(()=>mapObj.current.invalidateSize(),150)}} style={{textAlign:"center",cursor:"pointer",minWidth:60}}>
          {isA?(
            <div style={{background:"#FCD34D",border:"3px solid #1a1a1a",borderRadius:18,padding:"8px 10px 4px",display:"inline-flex",flexDirection:"column",alignItems:"center",boxShadow:"2px 2px 0 #1a1a1a"}}>
              <BI type={t.type} active={true}/>
              <div style={{fontFamily:"'Passion One',sans-serif",fontSize:11,letterSpacing:1.5,color:"#1a1a1a",marginTop:1}}>{t.label}</div>
            </div>
          ):(
            <div style={{padding:"8px 4px 4px",display:"inline-flex",flexDirection:"column",alignItems:"center"}}>
              <BI type={t.type} active={false}/>
              <div style={{fontFamily:"'Passion One',sans-serif",fontSize:11,letterSpacing:1,color:"#888",marginTop:2}}>{t.label}</div>
            </div>
          )}
        </div>
      );
    })}
  </div>

</div>);
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>

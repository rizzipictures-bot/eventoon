name: Aggiorna Eventi EVENTOON

on:
  schedule:
    - cron: '0 6 1 1 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Esegui scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper.py
      
      - name: Commit e push eventi aggiornati
        run: |
          git config --local user.email "eventoon-bot@users.noreply.github.com"
          git config --local user.name "Eventoon Bot"
          git add public/events.json
          git diff --staged --quiet || git commit -m "Eventi aggiornati $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase
          git push
